services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./reports:/reports
      - ./samples:/samples
    environment:
      PYTHONUNBUFFERED: "1"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY: "http://backend:8000"
    depends_on:
      - backend

