# KMFA 统一云端部署（Coolify 资源）——单一治理平面。
#
# 治理原则（Owner 2026-07-18）：统一治理、降复杂度、不加第四件——
#   Coolify = 唯一部署/编排面板，Cloudflare = DNS/边缘 TLS，OVH = 主机；不引入独立 bootstrap/Tunnel。
#
# 用法：Coolify → New Resource → Docker Compose → 指向本仓 `KMFA/deploy/coolify/docker-compose.yml`。
#   · env/secrets 在 Coolify 面板设（键位见同目录 `.env.example`；`KMFA_DELIVERY_ENABLED` 初始 0）。
#   · 域名在 Coolify 给 app 服务设 `kmfa.linzezhang.com`（Coolify Traefik + Cloudflare 代理）。
#
# 分批（3.7GB 容量 Gate）：默认只起 skills（app 在 `full` profile 后置）；观测内存无碍后再启 app。
#
# 自包含镜像：build.context = 仓根（`.`），Dockerfile 用 `COPY . /opt/kmfa/KMOS` 把代码烧进镜像。
#   **不挂宿主仓**——真 Coolify 上 `./` 运行时挂载只含 compose、无代码（DT9 主机核验坐实），故弃之。
#   代码随每次 push 重 build 更新。本机验证：build 后 `docker run`（不挂任何卷）跑 self-audit 应 rc=0。

services:
  skills:
    build:
      context: .                              # 仓根（Coolify Golden Path project-dir）
      dockerfile: KMFA/deploy/skills-runtime/Dockerfile   # 复用 #109 Dockerfile，内 COPY . 烧代码进镜像
    image: kmfa-skills:coolify
    container_name: kmfa-skills
    restart: always
    environment:
      # 业务锚北京时间——entrypoint 有 +0800 守卫，切勿覆盖为他时区（否则 cron 按错钟评估排程）
      TZ: Asia/Shanghai
      # 双跑纪律：默认 0 只 dry-run；比对通过 + Owner 同意后于 Coolify 面板置 1
      KMFA_DELIVERY_ENABLED: "${KMFA_DELIVERY_ENABLED:-0}"
      # 考勤 dws 双闸之一：dws 登录 + browser-policy 完成后于 Coolify 置 1
      KMFA_DINGTALK_ATTENDANCE_ALLOW_DWS_COMMANDS: "${KMFA_DINGTALK_ATTENDANCE_ALLOW_DWS_COMMANDS:-0}"
      DINGTALK_ROBOT_URL: "${DINGTALK_ROBOT_URL:-}"
      DINGTALK_ROBOT_SIGNING_KEY: "${DINGTALK_ROBOT_SIGNING_KEY:-}"
      DINGTALK_DING_ROBOT_CODE: "${DINGTALK_DING_ROBOT_CODE:-}"
      KMFA_ALERT_WEBHOOK_TOKEN: "${KMFA_ALERT_WEBHOOK_TOKEN:-}"
    volumes:
      # 代码已烧进镜像（自包含），不挂宿主仓
      - kmfa-dws-auth:/root/.dws                  # dws 登录态持久（实例内加密存储）
      - kmfa-dws-keyring:/root/.local/share/dws-cli
      - kmfa-logs:/var/log/kmfa                   # 台账/日志持久
    healthcheck:
      test: ["CMD", "/opt/runtime/healthcheck.sh"]
      interval: 5m
      timeout: 20s
      start_period: 1m

  app:
    profiles: ["full"]                            # P2：容量确认后于 Coolify 启用 full profile 再起
    build:
      context: .
      dockerfile: KMFA/app/backend/Dockerfile
    image: kmfa-app:coolify
    container_name: kmfa-app
    restart: always
    environment:
      TZ: Asia/Shanghai
      # 根域名公开不等于私有 API 公开：生产源站二次校验 Access JWT。
      # 配置缺失时 /api*、/ops* fail-closed，/、/assets*、/healthz 仍可服务。
      KMFA_PUBLIC_SHELL_ENABLED: "${KMFA_PUBLIC_SHELL_ENABLED:-1}"
      # 搜索索引独立灰度；默认 hold，隐私/爬虫 canary 全绿后才显式置 1。
      KMFA_PUBLIC_INDEXING_ENABLED: "${KMFA_PUBLIC_INDEXING_ENABLED:-0}"
      KMFA_PRIVATE_OPS_REQUIRE_ACCESS: "${KMFA_PRIVATE_OPS_REQUIRE_ACCESS:-1}"
      KMFA_CLOUDFLARE_ACCESS_TEAM_DOMAIN: "${KMFA_CLOUDFLARE_ACCESS_TEAM_DOMAIN:-}"
      KMFA_CLOUDFLARE_ACCESS_AUD: "${KMFA_CLOUDFLARE_ACCESS_AUD:-}"
    # 代码/facts 已烧进镜像（自包含），不挂宿主仓
    volumes:
      # 只读挂 skills 的日志卷：App 要能显示「排程到底跑没跑」。
      # 在此之前 app 一个卷都不挂，排程健康只能靠人登服务器看——
      # 于是每次都要 Owner 亲自去查再回报，这个来回本身就是设计缺陷。
      - kmfa-logs:/var/log/kmfa:ro
    expose:
      - "8000"                                    # 经 Coolify Traefik 暴露；域名在 Coolify 面板设，无需开放主机端口
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request;urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 2m
      timeout: 10s

volumes:
  kmfa-dws-auth:
  kmfa-dws-keyring:
  kmfa-logs:
