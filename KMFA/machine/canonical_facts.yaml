  task: T-S04-01
- id: R-WS-002
  area: 匿名工作区
  title: 跨设备恢复
  statement: 用户可下载 `.kmfa-recovery` 文件或复制恢复码，在新设备恢复同一工作区；恢复前必须清晰提示丢失密钥无法通过邮箱找回。
  priority: P0
  metric: 有效恢复成功率
  baseline: 尚未实现
