  owner: Frontend
  task: T-S03-02
- id: R-PUB-005
  area: 公开入口
  title: 可访问、移动端与可索引边界
  statement: 主页和公开发布页满足 WCAG 2.2 AA 关键标准、主流移动端可用，并且仅批准公开内容进入 sitemap/robots 索引。
