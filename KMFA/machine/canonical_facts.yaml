  target: '0'
  window: 每次迁移及季度恢复
  owner: Data/Backend
  task: T-S05-01
- id: R-DATA-002
  area: 持久化
  title: 文件字节耐久保存
  statement: 图片、文档、音视频及任意附件的原始字节写入版本化对象存储，并由数据库保存对象键、校验和、大小、媒体类型、状态与血缘。
  priority: P0
  metric: 数据库索引与对象不一致数
  baseline: 需核验
