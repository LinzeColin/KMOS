  owner: Security
  task: T-S06-02
- id: R-UP-004
  area: 上传
  title: 不可变版本与来源血缘
  statement: 每次上传与处理生成不可变 object version、内容校验和、来源、时间、处理器版本及派生关系；覆盖操作不得抹除历史。
  priority: P0
  metric: 无血缘文件版本数
  baseline: 未完整证明
  target: '0'
  window: 每次上传/处理
  owner: Data
  task: T-S06-03
- id: R-DL-001
  area: 下载
  title: 原件与派生文件下载
  statement: 用户可下载原件、批准的预览/派生文件和报告，文件名、内容类型、大小、校验和与来源清晰可见。
  priority: P0
  metric: 可用文件无法下载或内容不一致数
  baseline: 需核验
  target: '0'
  window: 每次发布
  owner: Backend+Frontend
  task: T-S07-01
- id: R-DL-002
