- id: R-UP-003
  area: 上传
  title: 隔离、验证与扫描
  statement: 上传先进入隔离区，执行文件名归一化、路径穿越防护、大小/配额、MIME 与 magic bytes、压缩炸弹、恶意内容和解析器沙箱检查，再决定可预览、仅下载或拒绝。
