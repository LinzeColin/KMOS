schema_version: '1.0'
taskpack_version: 1.5.2
status: FINAL_AUTHORIZED
authorized_at: '2026-07-22'
product:
  name: KMFA
  target_url: https://kmfa.linzezhang.com/
  homepage_path: /
  legacy_paths:
  - /ui
  - /ui/
  product_runtime_version: TO_BE_VERIFIED_IN_S00
  pursuing_goal: 在不丢失 v1.5 恢复资产、不泄露未主动公开的数据且不引入无收益复杂度的前提下，将 KMFA 交付为根域名即主页、无需账号即可完整使用、支持任意文件安全上传与下载、项目/进度/分数及文件长期持久化直至用户明确删除、可恢复、可验证、可灰度发布并可快速回滚的公开软件。
owner_authorization:
  summary: 进入最终交付；软件无需账号，支持上传和下载到长期耐久存储；只交付任务包 ZIP、Roadmap PDF 和一句 pursuing goal prompt。
  interpretation:
  - 核心产品全程免登录。
  - 任意文件类型均可安全存储，未知/高风险格式不执行。
  - 网站公开不等于用户上传内容自动公开。
  - 永久保存采用工程定义：无自动到期、跨部署存在、可备份恢复、保留至明确删除或获批处置。
decisions:
- id: D-001
  title: 根域名即主页
  decision: '`https://kmfa.linzezhang.com/` 直接返回完整应用主页，HTTP 200，浏览器地址保持 `/`。'
  status: APPROVED
- id: D-002
  title: 旧路径兼容
  decision: '`/ui` 与 `/ui/` 只作兼容入口，308 永久重定向到 `/`，不得形成循环。'
  status: APPROVED
- id: D-003
  title: 无需账号
  decision: 公开浏览、建项目、上传、处理、保存、恢复、搜索、下载和导出均不要求账号、邮箱或第三方 OAuth。
  status: APPROVED
- id: D-004
  title: 匿名长期工作区
  decision: 首次使用自动创建匿名工作区；用户通过本机安全会话及一次性展示的恢复密钥持续访问。
  status: APPROVED
- id: D-005
  title: 永久保存的工程定义
  decision: 数据无自动到期，跨重启和重新部署仍存在，定期备份并通过恢复演练；保留至用户明确删除或获批的法律/安全处置。
  status: APPROVED
- id: D-006
  title: 数据库与文件存储分工
  decision: 项目、进度、分数、文件索引、版本、任务和审计写入耐久关系数据库；文件字节写入耐久对象存储。两者共同构成用户所理解的永久数据库。
  status: APPROVED
- id: D-007
  title: 任意文件类型
  decision: 允许任何扩展名进入安全存储；无法安全解析或高风险文件仅作为附件下载，不执行、不内联渲染。
  status: APPROVED
- id: D-008
  title: 默认不公开上传内容
  decision: 网站是 public 不等于用户文件公开；新文件默认 Unlisted，只有显式发布才产生可撤销公开快照或链接。
  status: APPROVED
- id: D-009
  title: 删除登录范围
  decision: Google/GitHub/ChatGPT 登录不进入 v1.5.2 GA 范围，除非未来另行授权；不得以身份集成阻塞公开软件交付。
  status: APPROVED
- id: D-010
  title: 恢复优先
  decision: 变更前核对当前 main、生产制品、v1.5 恢复 checkpoint 与历史包；禁止盲目 replay、force-push 或夹带未完成 S24。
  status: APPROVED
- id: D-011
  title: 安全 HTTP 语义
  decision: 查看、搜索、状态和下载请求不得改变业务状态；高成本导出采用显式创建任务的命令流程。
  status: APPROVED
- id: D-012
  title: 最小治理产物
  decision: 复用双平面七文件、Canonical Facts、Acceptance Contract、Task Graph 与精简 CI receipt，不创建平行台账和逐阶段 EVIDENCE 文件树。
  status: APPROVED
- id: D-013
  title: 渐进发布
  decision: 小批量可逆变更、Feature Flag、Canary/Blue-Green 等效机制、发布后 Oracle 和自动回滚是 GA 必要条件。
  status: APPROVED
- id: D-014
  title: AI 条件流水线
  decision: 只有存在实际面向用户的模型能力时才启动模型能力与安全流水线；否则明确 N/A，不制造纸面 AI 工作。
  status: APPROVED
strategic_goal: 把 KMFA 从受登录墙阻断的线上入口，收敛为匿名可完整使用、数据长期耐久、任意文件可安全上传下载、财务结果可追溯且可安全发布的公开软件。
okrs:
- id: O1
  objective: 公开入口真实可用
  key_results:
  - 生产匿名 GET / 为 200，最终 URL 为 /，无 Access/登录重定向。
  - 匿名核心旅程从主页到上传、保存、恢复、下载和导出 100% 通过。
  - /ui 与 /ui/ 单跳 308 到 /，无路由或 canonical 分叉。
- id: O2
  objective: 耐久保存与数据可取回
  key_results:
  - 结构化数据和文件字节跨重启、滚动部署和备份恢复无丢失。
  - 对象与数据库索引不可解释不一致为 0。
  - 原件/派生物/报告下载 hash 一致，标准恢复夹具 100% 通过。
- id: O3
  objective: 公开但不泄露、不失控
  key_results:
  - 私密 canary 在页面、API、搜索、缓存、对象链接和遥测中的命中为 0。
  - 恶意上传逃逸和危险文件执行均为 0。
  - 匿名攻击负载不造成无界资源增长，正常用户误伤率低于 1%。
- id: O4
  objective: 证据驱动的安全交付
  key_results:
  - 49 条需求全部追到唯一主 Acceptance、任务、测试、证据和制品。
  - Task DAG 无环，14 个 Stage 每个 4 个 Phase/Task。
  - 所有 P0 Gate 通过且回滚 Oracle 通过后才 GA。
non_goals:
- 不把 KMFA 扩张为完整 ERP、网盘协作套件、通用 BI 或元数据治理平台。
- 不以 Google/GitHub/ChatGPT 登录作为 v1.5.2 核心能力或 GA 依赖。
- 不承诺物理永恒、无限容量或无限免费出网；限制必须可见、可核验、可调整。
- 不把所有用户上传内容自动公开或纳入搜索引擎。
- 不为实现 Canary、Search、AI 等名词而强制迁移 Kubernetes 或增加独立服务。
- 不创建 SCHEMAS/*.json、state_ledger.py、catalog_builder.py、逐阶段 EVIDENCE/*.json 等形式化台账。
- 不盲目 replay v1.5、不 force-push、不夹带未完成 S24。
storage_contract:
  structured_data: 耐久事务数据库（默认优先现有合格 PostgreSQL 或等效）
  file_bytes: 版本化、私有 S3-compatible 对象存储（默认优先现有 Cloudflare R2 或等效）
  browser_storage: 仅缓存/会话辅助，绝非 SSOT
  retention: 默认无自动到期，保留至用户明确删除或获批法律/安全处置
  durability_proof:
  - 跨重启
  - 跨滚动部署
  - 数据库备份恢复
  - 对象版本/备份恢复
  - 应用级下载与业务不变量验证
privacy_contract:
  site_visibility: PUBLIC
  workspace_visibility_default: UNLISTED
  publish_mode: EXPLICIT_REVOCABLE_SNAPSHOT
  secret_transport: 不得进入 URL/Referer/log/analytics/error/cache
  public_indexing: 仅显式发布且通过字段白名单的快照
requirements:
- id: R-GOV-001
  area: 治理
  title: 权威源与恢复核对
  statement: 任何产品改动前，必须确定当前 main、生产制品、v1.5 recovery checkpoint 和历史任务包的关系，并逐项分类为采用、重做、废弃或冲突。
  priority: P0
  metric: 未分类恢复差异数
  baseline: 未知；v1.5 记录仍有 99 个 unresolved、其中 53 个 core
  target: 0 个进入实现而未分类的差异
  window: 每次恢复/迁移前
  owner: Tech Lead
  task: T-S00-02
- id: R-GOV-002
  area: 治理
  title: 版本与权威分离
  statement: 任务包版本、产品/runtime 版本和部署制品身份必须分离记录，禁止以任务包 v1.5.2 推断产品版本。
  priority: P0
  metric: 版本身份歧义数
  baseline: 历史存在混用
  target: '0'
  window: 每次发布
  owner: Release Owner
  task: T-S00-03
- id: R-GOV-003
  area: 治理
  title: 双平面七文件
  statement: 人类平面严格使用七个既有治理文件；机器平面仅保存最小权威事实、验收合同、任务图和发布策略。
  priority: P0
  metric: 权威治理文件集合
  baseline: 现有仓库已有七文件但机器事实链需核验
  target: 精确七文件且机器校验通过
  window: 每次合并
  owner: Product+Tech Lead
  task: T-S02-02
- id: R-GOV-004
  area: 治理
  title: 预授权与最小暂停
  statement: 开发前穷尽普通依赖并预授权可逆决策；只有 Stop Condition 触发时暂停，且输出最小决策问题、证据、默认建议和不决策后果。
  priority: P0
  metric: 开发中非必要阻塞次数
  baseline: 未知
  target: '0'
  window: 整个开发周期
  owner: Delivery Lead
  task: T-S00-04
- id: R-GOV-005
  area: 治理
  title: 成本收益与 Kill Criteria
  statement: 每个重大能力必须有收益/成本区间、敏感性、机会成本、置信度和明确 Kill Criteria，不承诺伪精确收益。
  priority: P1
  metric: 无经济判据的重大能力数
  baseline: 历史不完整
  target: '0'
  window: 立项与 GA Gate
  owner: Product Owner
  task: T-S01-03
- id: R-PUB-001
  area: 公开入口
  title: 根域名直接主页
  statement: 匿名访问 `https://kmfa.linzezhang.com/` 必须直接进入完整软件主页，HTTP 200，最终 URL 为 `/`，不出现 Cloudflare Access 或任何登录页。
  priority: P0
  metric: 匿名根入口成功率
  baseline: 2026-07-22 验收为 FAIL：302 到 Cloudflare Access
  target: 发布 Oracle 100%；上线 7 天滚动 >=99.9%
  window: 每次部署及上线后 7 天
  owner: Web/Edge
  task: T-S03-01
- id: R-PUB-002
  area: 公开入口
  title: 核心功能全部免登录
  statement: 匿名用户可浏览、创建工作区、建项目、上传、处理、保存、恢复、搜索、下载和导出，无账号、邮箱或 OAuth 前置步骤。
  priority: P0
  metric: 核心流程登录阻断数
  baseline: 当前全站 Access 登录墙
  target: '0'
  window: 每次发布
  owner: Product+Web
  task: T-S03-02
- id: R-PUB-003
  area: 公开入口
  title: 旧 UI 路径收敛
  statement: '`/ui` 与 `/ui/` 必须 308 重定向到 `/`，根路径不得再跳向 `/ui/`，canonical、sitemap 和分享链接统一指向根路径。'
  priority: P0
  metric: 路由/SEO 分叉数
  baseline: 历史 `/` 307 到 `/ui/`
  target: '0'
  window: 每次发布
  owner: Web/Edge
  task: T-S03-01
- id: R-PUB-004
  area: 公开入口
  title: 完整 App Shell 与公共浏览
  statement: 根主页必须加载导航、项目入口、上传区、搜索、进度、报告和帮助等完整 App Shell，并在无 JavaScript 或关键依赖降级时给出可理解状态。
