  owner: Storage/Backend
  task: T-S05-02
- id: R-DATA-003
  area: 持久化
  title: 永久保留与删除
  statement: 数据默认无自动到期并保留至用户明确删除或获批的法律/安全处置；删除采用可审计生命周期，包含撤销公开链接、回收对象版本和保留期策略。
