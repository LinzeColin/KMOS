  task: T-S04-02
- id: R-WS-003
  area: 匿名工作区
  title: 恢复密钥不泄露
  statement: workspace secret 不得出现在 URL、Referer、日志、分析事件、错误上报、截图或可公开缓存中；浏览器会话使用安全、短时、可撤销凭据。
  priority: P0
  metric: 秘密泄露 canary 命中
  baseline: 尚未验证
  target: '0'
  window: 每次安全回归
  owner: Security
  task: T-S04-03
- id: R-WS-004
  area: 匿名工作区
  title: 无账号条件下的反滥用
  statement: 匿名核心流程保持可用，同时用分层限额、速率限制、并发预算、可疑行为挑战和资源隔离控制滥用，不将登录作为安全替代品。
  priority: P0
  metric: 资源滥用导致的 SLO 违约/正常用户误伤
