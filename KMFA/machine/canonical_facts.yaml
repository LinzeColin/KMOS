  task: T-S04-04
- id: R-DATA-001
  area: 持久化
  title: 结构化数据耐久保存
  statement: 项目、用户进度、分数、财务记录、文件元数据、版本、任务和审计写入事务型耐久数据库；浏览器存储不得作为唯一权威源。
  priority: P0
  metric: 重启/重部署后记录丢失数
