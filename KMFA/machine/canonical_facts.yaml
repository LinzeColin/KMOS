  target: 0 阻断；0 私密索引命中
  window: 每次发布
  owner: Frontend+Privacy
  task: T-S03-03
- id: R-WS-001
  area: 匿名工作区
  title: 匿名工作区身份
  statement: 首次访问自动生成高熵 workspace ID 与 256-bit 恢复密钥；服务器仅保存不可逆 verifier，不保存明文恢复密钥。
