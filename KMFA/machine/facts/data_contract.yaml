{
  "data_flow": "原始文件（只读）→ 只读扫描并计算摘要 → 原始清单 → 抽取（带源文件、表、单元格、页）→ 标准化（整数分，禁浮点）→ 身份匹配（不小于 0.85 自动，0.70 到 0.85 人工，低于 0.50 拒绝）→ 规范事实 → 计算派生指标（收入、成本、毛利、毛利率、未归集成本池）→ 报告引用 → 看板展示。每一跳都必须留血缘；断一跳，报告等级降到 D。源优先级链共 7 环：原始授权导出 → 原始抽取值 → 暂存结构化行 → 规范事实 → 派生指标 → 报告引用 → 看板展示；第 1 环从未接通，导致第 2 到 7 环全部悬空。",
  "entities": [
    {
      "entity": "原始清单",
      "keys": [
        "`source_file`",
        "`hash`",
        "`size`",
        "`mtime`"
      ],
      "pk": "`hash`"
    },
    {
      "entity": "原始抽取值",
      "keys": [
        "`source_file`",
        "`sheet`",
        "`cell`",
        "`page`",
        "`raw_value`"
      ],
      "pk": "`source_file`+`cell`"
    },
    {
      "entity": "暂存结构化行",
      "keys": [
        "`normalized_value_cents`",
        "`source_ref`"
      ],
      "pk": "`source_ref`"
    },
    {
      "entity": "规范事实",
      "keys": [
        "`project_id`",
        "`amount_cents`",
        "`lineage`"
      ],
      "pk": "`project_id`"
    },
    {
      "entity": "派生指标",
      "keys": [
        "`收入`",
        "`成本`",
        "`毛利`",
        "`毛利率`",
        "`未归集成本池`"
      ],
      "pk": "`project_id`"
    }
  ]
}