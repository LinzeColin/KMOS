schema_version: '1.0'
taskpack_version: 1.5.2
acceptance_contracts:
- id: AC-GOV-001
  requirement_id: R-GOV-001
  title: 权威源与恢复核对
  environment: 只读审计工作区；当前 main、生产制品身份、v1.5 recovery bundle 与历史包
  preconditions:
  - 部署/构建制品身份可追溯
  - 测试数据不含真实敏感信息，私密场景使用 canary fixture
  - 执行者具备只读或已预授权的最小权限
  input: 四组 commit/config/artifact 清单与差异
  procedure: 生成三方/四方 diff，将每项差异标记 Adopt/Redo/Discard/Conflict，并人工只审不可逆冲突
  threshold: 所有将进入实现的差异均有唯一处置；未分类数=0；禁止 replay/force-push
  evidence: reconciliation.csv、commit graph、只读命令日志、签署的处置摘要
  automation: 半自动
  observation_window: S00 完成前
  test_id: TEST-GOV-001
  artifact: CI/Release Artifact + compact receipt
  task_ids:
  - T-S00-02
  pass_gate: AC-GOV-001 的阈值全部满足，证据可复现且无未解释例外；否则阻断对应 Stage/Release Gate。
- id: AC-GOV-002
  requirement_id: R-GOV-002
  title: 版本与权威分离
