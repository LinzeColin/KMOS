schema_version: '1.0'
taskpack_version: 1.5.2
graph_policy:
  acyclic: true
  max_direct_children_per_stage: 5
  max_direct_tasks_per_phase: 5
  one_primary_acceptance_per_requirement: true
  task_slice: 每个任务默认 0.5-2 engineer-days；超过 2 天或含多于一个不可逆风险时必须再切片。
  evidence_policy: 完整日志/截图/测试制品进入 CI/Release Artifacts；仓库只保留 compact receipt。
stages:
- id: S00
  title: 权威、恢复与启动授权
  objective: 先知道正在改什么、什么不能覆盖、哪些输入已经一次性准备好。
  deliverable: 四方身份快照、恢复差异处置、版本权威表、预授权清单。
  gate: 所有进入实现的差异已分类；产品版本与任务包版本不混用；普通依赖不再阻塞。
  phases:
  - id: P-S00-01
    title: P0.1 只读取证
    task_ids:
    - T-S00-01
  - id: P-S00-02
    title: P0.2 恢复核对
    task_ids:
    - T-S00-02
  - id: P-S00-03
    title: P0.3 权威建立
    task_ids:
    - T-S00-03
  - id: P-S00-04
    title: P0.4 开发去阻塞
    task_ids:
    - T-S00-04
- id: S01
  title: Working Backwards 与产品合同
  objective: 从客户问题和可证伪结果出发，冻结清晰范围、成功标准和停止条件。
  deliverable: PR/FAQ、PRD、OKR、Baseline、成本收益与 Kill Criteria。
  gate: 问题、用户、价值、非目标、指标、观察期、经济判据和范围均无歧义。
  phases:
  - id: P-S01-01
    title: P1.1 客户倒推
    task_ids:
    - T-S01-01
  - id: P-S01-02
    title: P1.2 PRD 与 OKR
    task_ids:
    - T-S01-02
  - id: P-S01-03
    title: P1.3 经济与证伪
    task_ids:
    - T-S01-03
  - id: P-S01-04
    title: P1.4 合同冻结
    task_ids:
    - T-S01-04
- id: S02
  title: Canonical Facts 与精简双平面
  objective: 把产品合同变成一条可生成、可校验、不重复的事实链。
  deliverable: Canonical Facts、七文件、Acceptance Contract、Task Graph、Traceability 与 validator。
  gate: 七文件精确、DAG 无环、所有需求追踪闭合、禁止形式化证据树。
  phases:
  - id: P-S02-01
    title: P2.1 事实建模
    task_ids:
    - T-S02-01
  - id: P-S02-02
    title: P2.2 七文件渲染
    task_ids:
    - T-S02-02
  - id: P-S02-03
    title: P2.3 验收与追踪
    task_ids:
    - T-S02-03
  - id: P-S02-04
    title: P2.4 机器门禁
    task_ids:
    - T-S02-04
- id: S03
  title: 公开根主页与 Walking Skeleton
  objective: 先让匿名用户在根域名看到并走通真实软件，而不是登录墙或路径跳转。
  deliverable: 根入口、旧路径兼容、完整 App Shell、早期端到端骨架。
  gate: 生产等价匿名根入口 Oracle 通过；核心骨架可在 Flag 下回滚。
  phases:
  - id: P-S03-01
    title: P3.1 边缘路由
    task_ids:
    - T-S03-01
  - id: P-S03-02
    title: P3.2 App Shell
    task_ids:
    - T-S03-02
  - id: P-S03-03
    title: P3.3 可访问与公开索引
    task_ids:
    - T-S03-03
  - id: P-S03-04
    title: P3.4 早期骨架
    task_ids:
    - T-S03-04
- id: S04
  title: 匿名工作区、恢复与反滥用
  objective: 在不登录的前提下，让用户长期找回自己的数据，并控制滥用。
  deliverable: 高熵匿名身份、恢复码/文件、短时会话、限额和挑战机制。
  gate: 跨设备恢复 100% 通过；secret 泄露为 0；攻击负载不拖垮正常用户。
  phases:
  - id: P-S04-01
    title: P4.1 匿名身份
    task_ids:
    - T-S04-01
  - id: P-S04-02
    title: P4.2 恢复体验
    task_ids:
    - T-S04-02
  - id: P-S04-03
    title: P4.3 Secret hygiene
    task_ids:
    - T-S04-03
  - id: P-S04-04
    title: P4.4 反滥用
    task_ids:
    - T-S04-04
- id: S05
  title: 耐久数据库、对象存储与生命周期
  objective: 把用户理解的“永久数据库”落成可恢复的结构化数据与文件存储。
  deliverable: 事务数据库、对象存储、状态机/对账、备份恢复与删除生命周期。
  gate: 跨重启/部署/恢复数据不丢；对象和索引一致；默认无自动到期。
  phases:
  - id: P-S05-01
    title: P5.1 结构化数据库
    task_ids:
    - T-S05-01
  - id: P-S05-02
    title: P5.2 对象存储
    task_ids:
    - T-S05-02
  - id: P-S05-03
    title: P5.3 一致性状态机
    task_ids:
    - T-S05-03
  - id: P-S05-04
    title: P5.4 保留、备份与恢复
    task_ids:
    - T-S05-04
- id: S06
  title: 任意文件安全上传
  objective: 允许全部文件类型进入耐久存储，同时不让未知或恶意文件危害系统。
  deliverable: resumable upload、隔离扫描、处理/预览状态、全量负向与并发测试。
  gate: 合法文件可存储；危险文件不执行；中断可恢复；原件不可变。
  phases:
  - id: P-S06-01
    title: P6.1 上传合同
    task_ids:
    - T-S06-01
  - id: P-S06-02
    title: P6.2 隔离与扫描
    task_ids:
    - T-S06-02
  - id: P-S06-03
    title: P6.3 版本、血缘与预览
    task_ids:
    - T-S06-03
  - id: P-S06-04
    title: P6.4 上传质量门
    task_ids:
    - T-S06-04
- id: S07
  title: 可靠下载、批量导出与安全读取
  objective: 让用户随时取回原件和成果，且读取操作无隐藏副作用。
  deliverable: 单文件/Range/批量 ZIP、显式导出 Job、授权和负载门禁。
  gate: 下载字节一致；批量不丢失；GET/HEAD 无业务副作用；导出受预算控制。
  phases:
  - id: P-S07-01
    title: P7.1 单文件下载
    task_ids:
    - T-S07-01
  - id: P-S07-02
    title: P7.2 续传与批量 ZIP
    task_ids:
    - T-S07-02
  - id: P-S07-03
    title: P7.3 显式导出 Job
    task_ids:
    - T-S07-03
  - id: P-S07-04
    title: P7.4 下载与导出门禁
    task_ids:
    - T-S07-04
- id: S08
  title: 项目、进度、搜索、发布与统计
  objective: 让持久化文件转化为可管理、可找回、可选择公开的产品。
  deliverable: 项目/进度/分数、全文搜索、Publication Gate、隐私统计与可逆迁移。
  gate: 核心 CRUD/恢复一致；私密搜索命中为 0；默认 Unlisted；统计不含秘密。
  phases:
  - id: P-S08-01
    title: P8.1 项目与进度
    task_ids:
    - T-S08-01
  - id: P-S08-02
    title: P8.2 数据库全文搜索
    task_ids:
    - T-S08-02
  - id: P-S08-03
    title: P8.3 Publication Gate
    task_ids:
    - T-S08-03
  - id: P-S08-04
    title: P8.4 统计与可逆迁移
    task_ids:
    - T-S08-04
- id: S09
  title: KMFA 财务业务流与报告
  objective: 在公开、耐久、可恢复的基础上保证财务计算和业务解释正确。
  deliverable: 导入校验/血缘、精确计算、重跑冲突、报告与完整业务旅程。
  gate: 金额精确、关键结果可追溯、重跑不重复、Golden/Black Path 通过。
  phases:
  - id: P-S09-01
    title: P9.1 导入与血缘
    task_ids:
    - T-S09-01
  - id: P-S09-02
    title: P9.2 精确计算
    task_ids:
    - T-S09-02
  - id: P-S09-03
    title: P9.3 重跑与来源冲突
    task_ids:
    - T-S09-03
  - id: P-S09-04
    title: P9.4 业务流与报告
    task_ids:
    - T-S09-04
- id: S10
  title: Security Assurance 与条件性 AI 安全
  objective: 把公开、匿名、文件和财务风险纳入设计、构建、测试和维护全周期。
  deliverable: 威胁模型、SDLC/SBOM、授权/泄露红队、条件性 AI Gate。
  gate: 公开边界无 canary 泄露；高危漏洞为 0；AI 范围按真实能力处理。
  phases:
  - id: P-S10-01
    title: P10.1 威胁模型
    task_ids:
    - T-S10-01
  - id: P-S10-02
    title: P10.2 Secure SDLC 与供应链
    task_ids:
    - T-S10-02
  - id: P-S10-03
    title: P10.3 授权与泄露红队
    task_ids:
    - T-S10-03
  - id: P-S10-04
    title: P10.4 AI 条件 Gate
    task_ids:
    - T-S10-04
- id: S11
  title: 全层测试、极限与混沌
  objective: 用确定性 Oracle 和主动故障验证质量，而不是依赖文档或平均指标。
  deliverable: 单元/合同/属性/golden、E2E/视觉/a11y、压力/soak、混沌/恢复。
  gate: 五类路径完整；阻断测试通过；极限受控；故障后不变量保持。
  phases:
  - id: P-S11-01
    title: P11.1 确定性正确性
    task_ids:
    - T-S11-01
  - id: P-S11-02
    title: P11.2 用户路径
    task_ids:
    - T-S11-02
  - id: P-S11-03
    title: P11.3 性能与极限
    task_ids:
    - T-S11-03
  - id: P-S11-04
    title: P11.4 混沌与恢复
    task_ids:
    - T-S11-04
- id: S12
  title: 可观测、诊断、自愈、容量与运维
  objective: 让上线后的系统可看见、可解释、可恢复、成本可控。
  deliverable: OTel 信号/SLO、告警与 runbook、自愈、成本预算、例行恢复/补丁演练。
  gate: 关键旅程 100% 可关联；告警可执行；成本和恢复在预算内。
  phases:
  - id: P-S12-01
    title: P12.1 可观测与 SLO
    task_ids:
    - T-S12-01
  - id: P-S12-02
    title: P12.2 告警、诊断与自愈
    task_ids:
    - T-S12-02
  - id: P-S12-03
    title: P12.3 容量与成本护栏
    task_ids:
    - T-S12-03
  - id: P-S12-04
    title: P12.4 常态化运维演练
    task_ids:
    - T-S12-04
- id: S13
  title: 安全发布、自动回滚与 GA
  objective: 把通过验证的能力小批量、可逆地推向生产，并用真实 Oracle 决定晋级。
  deliverable: Feature Flags、Canary/Blue-Green 等效发布、发布后测试、GA 决策与证据封口。
  gate: 无错误晋级；回滚后核心 Oracle 恢复；GA 只基于证据而非完成感。
  phases:
  - id: P-S13-01
    title: P13.1 Feature Flag 与配置治理
    task_ids:
    - T-S13-01
  - id: P-S13-02
    title: P13.2 Canary/Blue-Green 与迁移发布
    task_ids:
    - T-S13-02
  - id: P-S13-03
    title: P13.3 发布后连续验收
    task_ids:
    - T-S13-03
  - id: P-S13-04
    title: P13.4 GA 与后验复核
    task_ids:
    - T-S13-04
tasks:
- id: T-S00-01
  stage_id: S00
  phase_id: P-S00-01
  phase: P0.1 只读取证
  title: 冻结当前系统与来源身份
  purpose: 记录当前 main、生产入口/制品、配置、数据库和历史输入的可核验身份，不做修改。
  inputs:
  - 当前仓库只读检出
  - 生产 URL 与部署元数据
  - 验收包、v1.5、v1.4.2 参考包
  outputs:
  - SOURCE_IDENTITY.md
  - commit/config/artifact digest 清单
  - 只读审计日志
  dependencies: []
  requirement_ids:
  - R-GOV-002
  acceptance_ids:
  - AC-GOV-002
  test: 重新执行身份命令应得到相同 git SHA/artifact digest；生产响应可关联部署身份。
  evidence: CI/Release Artifact，外加不超过 64KiB 的 compact receipt
  risk: 误把任务包版本当产品版本，或对错误仓库/环境实施变更。
  rollback: 只读任务，无业务回滚；删除临时凭据和本地审计副本。
  stop_condition: 无法确认目标仓库/生产环境唯一身份，或发现密钥/私密原始数据意外进入公共输入。
  pass_gate: 目标仓库、分支、产品版本、部署制品和输入包 SHA256 均唯一且已记录。
  estimate_engineer_days: 0.5-1.0
  owner: Tech Lead
  parallel_group: ''
- id: T-S00-02
  stage_id: S00
  phase_id: P-S00-02
  phase: P0.2 恢复核对
  title: 完成 main / production / v1.5 / history 四方 reconciliation
  purpose: 保护恢复资产并消除盲目 replay 风险。
  inputs:
  - S00.1 身份快照
  - v1.5 partial recovery bundle
  - 当前 main 与生产制品
  outputs:
  - RECOVERY_RECONCILIATION.csv
  - Adopt/Redo/Discard/Conflict 处置表
  - 未完成 S24 排除证明
  dependencies:
  - T-S00-01
  requirement_ids:
  - R-GOV-001
  acceptance_ids:
  - AC-GOV-001
  test: 拓扑检查所有差异有唯一处置；抽样从差异追到 commit/file/evidence；禁止 force push/replay 命令。
  evidence: CI/Release Artifact，外加不超过 64KiB 的 compact receipt
  risk: 覆盖当前有效代码、夹带未完成资产、丢失 v1.5 唯一恢复文件。
  rollback: 所有试验仅在隔离分支；删除试验分支即可恢复。
  stop_condition: 某冲突同时涉及不可逆数据迁移和无法确定的权威源。
  pass_gate: 进入开发范围的差异未分类数为 0；Conflict 均有默认建议与 owner。
  estimate_engineer_days: 1.0-2.0
  owner: Recovery Lead
  parallel_group: ''
- id: T-S00-03
  stage_id: S00
  phase_id: P-S00-03
  phase: P0.3 权威建立
  title: 建立版本、事实与责任权威表
  purpose: 明确谁对事实、产品、发布和验收负责。
  inputs:
  - S00.1 身份快照
  - S00.2 处置表
  - 现有七文件与 machine 目录
  outputs:
  - AUTHORITY_REGISTER.md
  - 版本 namespace 规则
  - one-writer-per-fact-domain 映射
  dependencies:
  - T-S00-01
  requirement_ids:
  - R-GOV-002
  acceptance_ids:
  - AC-GOV-002
  test: 同一事实域只能有一个 writer；从部署制品可反查源码与任务包；冲突解析规则可执行。
  evidence: CI/Release Artifact，外加不超过 64KiB 的 compact receipt
  risk: 产生第二套治理或版本漂移。
  rollback: 回退 authority 变更，不触碰业务数据。
  stop_condition: 发现两个生产源同时被声明为唯一权威且无法只读核验。
  pass_gate: 任务包/product/deployment 三类版本独立；每个事实域唯一 owner/writer。
  estimate_engineer_days: 0.5-1.0
  owner: Product+Tech Lead
  parallel_group: S00-B
- id: T-S00-04
  stage_id: S00
  phase_id: P-S00-04
  phase: P0.4 开发去阻塞
  title: 一次性准备依赖、权限、配额与默认决策
  purpose: 让后续开发只在不可逆或越权风险时暂停。
  inputs:
  - S00.2 处置表
  - S00.3 权威表
  - 平台账户/环境/域名/数据库/对象存储现状
  outputs:
  - PREAUTHORIZED_INPUTS_CHECKLIST.md
  - 默认决策表
  - Stop Condition 协议
  dependencies:
  - T-S00-02
  - T-S00-03
  requirement_ids:
  - R-GOV-004
  acceptance_ids:
  - AC-GOV-004
  test: 用缺失普通配置、配额不足、暂缺 OAuth 等场景演练；应采用可逆默认继续，而非阻塞。
  evidence: CI/Release Artifact，外加不超过 64KiB 的 compact receipt
  risk: 过度授权造成不可控修改，或授权不足导致开发中途停滞。
  rollback: 撤销临时权限和 Feature Flag；所有高风险权限设到期时间。
  stop_condition: 需要不可逆基础设施迁移、可能泄露私密数据、可能损坏唯一数据或超出已授权产品范围。
  pass_gate: 普通依赖均为 Ready/Default/Deferred-not-blocking；Stop 输出模板完整。
  estimate_engineer_days: 0.5-1.5
  owner: Delivery Lead
  parallel_group: ''
- id: T-S01-01
  stage_id: S01
  phase_id: P-S01-01
  phase: P1.1 客户倒推
  title: 编写面向客户的 PR/FAQ
  purpose: 先验证为什么需要这款软件，以及匿名、持久化、上传下载对用户的实际价值。
  inputs:
  - 用户明确授权
  - 2026-07-22 验收失败证据
  - 历史业务流与公开项目调研
  outputs:
  - PR/FAQ 章节
  - 客户问题-结果证据链
  - 反证问题清单
  dependencies:
  - T-S00-04
  requirement_ids: []
  acceptance_ids: []
  test: 每个 FAQ 都能落到用户结果、非目标或风险；不得以技术组件替代客户价值。
  evidence: CI/Release Artifact，外加不超过 64KiB 的 compact receipt
  risk: 做成技术展示或完整 ERP，而不是可用的 KMFA 软件。
  rollback: 回退未授权范围，只保留用户明确核心合同。
  stop_condition: 发现目标用户或核心问题与用户明确授权根本冲突。
  pass_gate: PR/FAQ 经产品自审无技术先行表述，核心承诺可验收。
  estimate_engineer_days: 0.5-1.0
  owner: Product Design
  parallel_group: ''
- id: T-S01-02
  stage_id: S01
  phase_id: P-S01-02
  phase: P1.2 PRD 与 OKR
  title: 定义用户、Jobs、价值、范围、非目标与指标
  purpose: 把“全部都可以”收敛为安全可交付的核心软件合同。
  inputs:
  - S01.1 PR/FAQ
  - 用户授权与历史需求
  - Baseline 证据
  outputs:
