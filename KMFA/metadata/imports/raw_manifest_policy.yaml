{
  "schema_version": "kmfa.raw_manifest_policy.v1",
  "stage_phase": "S03-P1",
  "status": "active",
  "manifest_file": "KMFA/metadata/imports/raw_file_manifest.jsonl",
  "schema_ref": "KMFA/metadata/imports/raw_manifest_schema.json",
  "registration_tool_ref": "KMFA/tools/file_import_register.py",
  "supported_extensions": [".zip", ".xlsx", ".xls", ".csv", ".pdf", ".wps", ".et", ".dps"],
  "zip_extract_target_policy": "private_local_directory_only",
  "wps_or_ole_policy": "register_hash_manifest_and_operator_guidance_only_until_conversion_or_parser_stage",
  "append_only": true,
  "mutates_original_file": false,
  "mutates_original_extracted_value": false,
  "immutable_fields": [
    "import_run_id",
    "source_id",
    "file_hash",
    "storage_ref",
    "original_filename_hash"
  ],
  "correction_model": "append_new_manifest_record_or_resolution_event",
  "public_repo_sensitive_plaintext_allowed": false
}
