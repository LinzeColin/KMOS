{
  "schema_version": "kmfa.source_check_matrix_policy.v1",
  "project_id": "KMFA",
  "stage_phase": "S03-P2",
  "status": "active",
  "tool_ref": "KMFA/tools/source_check_matrix.py",
  "test_ref": "python3 -m unittest KMFA.tests.test_source_check_matrix -q",
  "matrix_file": "KMFA/metadata/sources/source_check_matrix.jsonl",
  "status_event_file": "KMFA/metadata/sources/source_status_events.jsonl",
  "required_dimensions": [
    "source_system",
    "business_segment",
    "source_package_ref",
    "entity_ref",
    "account_ref",
