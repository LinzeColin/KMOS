governance_spec_version: "1.0.0"
project_id: "KMFA"
assumptions:
  - assumption_id: "ASM-KMFA-001"
    statement: "KMFA 每次 pursuing goal 只处理一个 Stage，每次 run work 最多解决一个 Phase。"
    status: "active"
    fact_level: "EXTRACTED"
    evidence_refs:
      - "KMFA/AGENTS.md"
  - assumption_id: "ASM-KMFA-002"
    statement: "KMFA Stage 完成后必须先整体复审并修复问题，之后才允许整体上传 GitHub；中间 Phase 不上传。"
    status: "active"
    fact_level: "EXTRACTED"
    evidence_refs:
      - "KMFA/AGENTS.md"
      - "KMFA/HANDOFF.md"
  - assumption_id: "ASM-KMFA-003"
    statement: "P0 文件型项目成本分析必须基于授权导出或上传文件的 hash、manifest、字段映射、A0 黄金基准、整数分金额和 zero-delta 验证。"
    status: "planned"
    fact_level: "PROPOSED"
    evidence_refs:
      - "KMFA/模型参数文件.md"
  - assumption_id: "ASM-KMFA-004"
    statement: "公开仓库 metadata 只能保存索引、hash、状态、证据、schema/mapping/lineage/approval metadata，不能保存敏感明文或原始业务文件。"
    status: "active"
    fact_level: "EXTRACTED"
    evidence_refs:
      - "KMFA/docs/governance/METADATA_PROTOCOL.md"
      - "KMFA/metadata/protocol/metadata_protocol.yaml"
  - assumption_id: "ASM-KMFA-005"
    statement: "raw manifest、派生数据版本和前端控制事件必须 append-only；纠错、失效、重跑、处理意见只能追加事件，不能改写原始文件、原始抽取值或 raw 层。"
    status: "active"
    fact_level: "EXTRACTED"
    evidence_refs:
      - "KMFA/docs/governance/IMMUTABILITY_POLICY.md"
      - "KMFA/metadata/imports/raw_manifest_policy.yaml"
      - "KMFA/metadata/approvals/control_event_policy.yaml"
  - assumption_id: "ASM-KMFA-006"
    statement: "报告可信等级必须受数据质量等级门禁约束；缺少 zero-delta、关键差异关闭、人类确认或 lineage 证据时不得升级为 A 或正式内部报告。"
    status: "active"
    fact_level: "EXTRACTED"
    evidence_refs:
      - "KMFA/docs/governance/QUALITY_GATE_POLICY.md"
      - "KMFA/metadata/quality/quality_grade_policy.yaml"
      - "KMFA/metadata/reports/report_release_gate.yaml"
models:
  - model_id: "MOD-KMFA-GOV-001"
    name: "KMFA phase governance and public repository boundary"
    kind: "deterministic_governance_contract"
    purpose: "控制阶段推进、Phase 边界、GitHub 上传门禁和公开仓库隐私边界。"
    owner: "KMFA"
    status: "active"
    fact_level: "EXTRACTED"
    model_version: "0.1.0-s01p3"
    assumptions:
      - "ASM-KMFA-001"
      - "ASM-KMFA-002"
    formula_ids:
      - "FORM-KMFA-GOV-001"
    parameter_ids:
      - "PARAM-KMFA-001"
      - "PARAM-KMFA-002"
      - "PARAM-KMFA-003"
      - "PARAM-KMFA-004"
    inputs:
      - "user objective"
      - "KMFA TaskPack and Roadmap"
      - "CodexProject root governance"
    outputs:
      - "phase scope gate"
      - "stage upload gate"
      - "privacy stop condition"
    code_refs:
      - "KMFA/AGENTS.md"
      - "KMFA/README.md"
    test_refs:
      - "python3 scripts/lean_governance.py validate --project KMFA"
      - "python3 scripts/validate_project_governance.py --project KMFA"
    evidence_refs:
      - "KMFA/AGENTS.md"
      - "KMFA/docs/governance/project.yaml"
      - "KMFA/stage_artifacts/S01_STAGE_REVIEW/human/stage1_review_report.md"
  - model_id: "MOD-KMFA-COST-001"
    name: "KMFA file-based project cost analysis MVP"
    kind: "deterministic_financial_analysis_pipeline"
    purpose: "后续支持 A0 权威基准、金额标准化、零差异校验、差异队列和项目成本报告。"
    owner: "KMFA"
    status: "planned"
    fact_level: "PROPOSED"
    model_version: "planned-s04-to-s10"
    assumptions:
      - "ASM-KMFA-003"
    formula_ids:
      - "FORM-KMFA-AMOUNT-001"
    parameter_ids:
      - "PARAM-KMFA-101"
      - "PARAM-KMFA-102"
      - "PARAM-KMFA-103"
      - "PARAM-KMFA-104"
    inputs:
      - "raw file hash and manifest"
      - "authorized extracted values"
    outputs:
      - "canonical project cost facts"
      - "mismatch report"
      - "report grade"
    code_refs:
      - "not_implemented_until_S04_S09"
    test_refs:
      - "planned: KMFA/tools/zero_delta_validator.py"
    evidence_refs:
      - "KMFA/模型参数文件.md"
  - model_id: "MOD-KMFA-METADATA-001"
    name: "KMFA metadata protocol and identifier contract"
    kind: "deterministic_metadata_governance_contract"
    purpose: "定义 metadata 目录、核心标识符、公开仓库隐私边界和协议检查。"
    owner: "KMFA"
    status: "active"
    fact_level: "EXTRACTED"
    model_version: "0.1.0-s02p1"
    assumptions:
      - "ASM-KMFA-004"
    formula_ids:
      - "FORM-KMFA-METADATA-ID-001"
    parameter_ids:
      - "PARAM-KMFA-201"
      - "PARAM-KMFA-202"
    inputs:
      - "KMFA Roadmap S02-P1"
      - "KMFA data governance gate"
    outputs:
      - "metadata directory contract"
      - "identifier validation contract"
      - "public repository metadata privacy boundary"
    code_refs:
      - "KMFA/tools/metadata_protocol_check.py"
    test_refs:
      - "python3 KMFA/tools/metadata_protocol_check.py"
    evidence_refs:
      - "KMFA/docs/governance/METADATA_PROTOCOL.md"
      - "KMFA/metadata/protocol/metadata_protocol.yaml"
  - model_id: "MOD-KMFA-IMMUTABILITY-001"
    name: "KMFA raw immutability and append-only governance"
    kind: "deterministic_immutability_contract"
    purpose: "定义 raw manifest 不可变字段、派生数据版本化、控制事件写入边界，防止原始数据污染。"
    owner: "KMFA"
    status: "active"
    fact_level: "EXTRACTED"
    model_version: "0.1.0-s02p2"
    assumptions:
      - "ASM-KMFA-005"
    formula_ids:
      - "FORM-KMFA-IMMUTABILITY-001"
    parameter_ids:
      - "PARAM-KMFA-203"
      - "PARAM-KMFA-204"
    inputs:
      - "KMFA Roadmap S02-P2"
      - "KMFA data governance gate"
    outputs:
      - "raw manifest append-only contract"
      - "derived version append-only contract"
      - "control event no-raw-write contract"
    code_refs:
      - "KMFA/tools/immutability_policy_check.py"
    test_refs:
      - "python3 KMFA/tools/immutability_policy_check.py"
    evidence_refs:
      - "KMFA/docs/governance/IMMUTABILITY_POLICY.md"
      - "KMFA/stage_artifacts/S02_P2_immutability_policy/human/s02_p2_completion_record.md"
  - model_id: "MOD-KMFA-QUALITY-GATE-001"
    name: "KMFA data quality and report release gate"
    kind: "deterministic_quality_gate_contract"
    purpose: "定义 Q0-Q5 数据质量等级、A/B/C/D 报告可信等级和报告发布权限门禁。"
    owner: "KMFA"
    status: "active"
    fact_level: "EXTRACTED"
    model_version: "0.1.0-s02p3"
    assumptions:
      - "ASM-KMFA-006"
    formula_ids:
      - "FORM-KMFA-QUALITY-GATE-001"
    parameter_ids:
      - "PARAM-KMFA-205"
      - "PARAM-KMFA-206"
      - "PARAM-KMFA-207"
    inputs:
      - "KMFA Roadmap S02-P3"
      - "KMFA data governance quality gate"
    outputs:
      - "Q0-Q5 quality grade contract"
      - "A/B/C/D report trust grade contract"
      - "report release permission gate"
    code_refs:
      - "KMFA/tools/check_report_grade_gate.py"
    test_refs:
      - "python3 KMFA/tools/check_report_grade_gate.py"
    evidence_refs:
      - "KMFA/docs/governance/QUALITY_GATE_POLICY.md"
      - "KMFA/stage_artifacts/S02_P3_quality_gate/human/s02_p3_completion_record.md"
