governance_spec_version: "1.0.0"
project_id: "KMFA"
assumptions:
  - assumption_id: "ASM-KMFA-001"
    statement: "KMFA 每次 pursuing goal 只处理一个 Stage，每次 run work 最多解决一个 Phase。"
    status: "active"
    fact_level: "EXTRACTED"
    evidence_refs:
      - "KMFA/AGENTS.md"
  - assumption_id: "ASM-KMFA-002"
    statement: "KMFA Stage 完成后必须先整体复审并修复问题，之后才允许整体上传 GitHub；中间 Phase 不上传。"
    status: "active"
    fact_level: "EXTRACTED"
    evidence_refs:
      - "KMFA/AGENTS.md"
      - "KMFA/HANDOFF.md"
  - assumption_id: "ASM-KMFA-003"
    statement: "P0 文件型项目成本分析必须基于授权导出或上传文件的 hash、manifest、字段映射、A0 黄金基准、整数分金额和 zero-delta 验证。"
    status: "planned"
    fact_level: "PROPOSED"
    evidence_refs:
      - "KMFA/模型参数文件.md"
  - assumption_id: "ASM-KMFA-004"
    statement: "公开仓库 metadata 只能保存索引、hash、状态、证据、schema/mapping/lineage/approval metadata，不能保存敏感明文或原始业务文件。"
    status: "active"
    fact_level: "EXTRACTED"
    evidence_refs:
      - "KMFA/docs/governance/METADATA_PROTOCOL.md"
      - "KMFA/metadata/protocol/metadata_protocol.yaml"
  - assumption_id: "ASM-KMFA-005"
    statement: "raw manifest、派生数据版本和前端控制事件必须 append-only；纠错、失效、重跑、处理意见只能追加事件，不能改写原始文件、原始抽取值或 raw 层。"
    status: "active"
    fact_level: "EXTRACTED"
    evidence_refs:
      - "KMFA/docs/governance/IMMUTABILITY_POLICY.md"
      - "KMFA/metadata/imports/raw_manifest_policy.yaml"
      - "KMFA/metadata/approvals/control_event_policy.yaml"
  - assumption_id: "ASM-KMFA-006"
    statement: "报告可信等级必须受数据质量等级门禁约束；缺少 zero-delta、关键差异关闭、人类确认或 lineage 证据时不得升级为 A 或正式内部报告。"
    status: "active"
    fact_level: "EXTRACTED"
    evidence_refs:
      - "KMFA/docs/governance/QUALITY_GATE_POLICY.md"
      - "KMFA/metadata/quality/quality_grade_policy.yaml"
      - "KMFA/metadata/reports/report_release_gate.yaml"
  - assumption_id: "ASM-KMFA-007"
    statement: "后续开发必须以 v1.2 FULL_HTML_NO_OMISSION 任务包为基线；涉及 UI、报告、前端或验收的任务必须读取 HTML/UIUX/报告样板。"
    status: "active"
    fact_level: "EXTRACTED"
    evidence_refs:
      - "KMFA/taskpack/v1_2/machine/source_package_manifest.json"
      - "KMFA/tools/check_required_html.py"
  - assumption_id: "ASM-KMFA-008"
    statement: "S03-P1 文件型导入只登记 hash、大小、批次、来源包、私有 storage ref 和操作提示；公开仓库不得保存原始文件 bytes、明文原始文件名或业务抽取值。"
    status: "active"
    fact_level: "EXTRACTED"
    evidence_refs:
      - "KMFA/stage_artifacts/S03_P1_file_import/human/s03_p1_completion_record.md"
      - "KMFA/metadata/imports/file_import_policy.yaml"
  - assumption_id: "ASM-KMFA-009"
    statement: "S03-P2 数据源检查矩阵只登记 metadata 维度和状态事件；状态变化必须 append-only 写入 metadata，不得污染原始源。"
    status: "active"
    fact_level: "EXTRACTED"
    evidence_refs:
      - "KMFA/stage_artifacts/S03_P2_source_check_matrix/human/s03_p2_completion_record.md"
      - "KMFA/metadata/sources/source_check_matrix_policy.yaml"
  - assumption_id: "ASM-KMFA-010"
    statement: "S03-P3 源优先级只生成 metadata 排序、失效重跑事件和人工差异队列项；跨源冲突不得自动选边。"
    status: "active"
    fact_level: "EXTRACTED"
    evidence_refs:
      - "KMFA/stage_artifacts/S03_P3_source_priority/human/s03_p3_completion_record.md"
      - "KMFA/metadata/sources/source_priority_policy.yaml"
