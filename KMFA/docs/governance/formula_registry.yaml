governance_spec_version: "1.0.0"
project_id: "KMFA"
formulas:
  - formula_id: "FORM-KMFA-GOV-001"
    model_id: "MOD-KMFA-GOV-001"
    assumption_ids:
      - "ASM-KMFA-001"
      - "ASM-KMFA-002"
    status: "active"
    fact_level: "EXTRACTED"
    expression: "phase_run_allowed = current_stage_only AND phase_count <= phase_max_per_run AND no_business_scope_escape; github_upload_allowed = stage_complete AND stage_review_complete AND review_findings_fixed"
    variables:
      - name: "phase_max_per_run"
        data_type: "integer"
        unit: "phase"
        input_domain: "1"
      - name: "stage_review_complete"
        data_type: "boolean"
        unit: "gate"
        input_domain: "true or false"
      - name: "review_findings_fixed"
        data_type: "boolean"
        unit: "gate"
        input_domain: "true or false"
      - name: "phase_github_upload_allowed"
        data_type: "boolean"
        unit: "gate"
        input_domain: "false for intermediate Phase; stage upload allowed only after review and fixes"
    constraints:
      - "One run work solves at most one Phase."
      - "Intermediate Phase completion does not upload to GitHub."
      - "Stage upload requires stage review and fixing review findings."
      - "Quality gates override time reference."
      - "Public repository cannot contain raw sensitive business data."
    missing_policy: "If gate evidence is missing, treat the action as blocked."
    output_range: "allow or stop"
    code_refs:
      - "KMFA/AGENTS.md"
      - "KMFA/HANDOFF.md"
    test_refs:
      - "python3 scripts/lean_governance.py validate --project KMFA"
      - "python3 scripts/validate_project_governance.py --project KMFA"
    evidence_refs:
      - "KMFA/docs/governance/project.yaml"
      - "KMFA/stage_artifacts/S01_STAGE_REVIEW/human/stage1_review_report.md"
  - formula_id: "FORM-KMFA-AMOUNT-001"
    model_id: "MOD-KMFA-COST-001"
    assumption_ids:
      - "ASM-KMFA-003"
    status: "active"
    fact_level: "EXTRACTED"
    expression: "normalized_amount_cents = Decimal(raw_amount * unit_multiplier * 100); any 0.01 yuan mismatch fails or enters mismatch queue."
    variables:
      - name: "raw_amount"
        data_type: "decimal string"
        unit: "yuan, thousand-yuan, or ten-thousand-yuan"
        input_domain: "authorized extracted value"
      - name: "unit_multiplier"
        data_type: "decimal"
        unit: "multiplier"
        input_domain: "1, 1000, or 10000"
      - name: "normalized_amount_cents"
        data_type: "integer"
        unit: "cent"
        input_domain: "business amount"
    constraints:
      - "No float for business money."
      - "Blank, dash, hash marks, and abnormal text must not silently become 0."
      - "PDF and Excel conflicts keep both source values and enter mismatch queue."
    missing_policy: "Missing or abnormal amount enters validation error or mismatch queue."
    output_range: "integer cents or validation error"
    code_refs:
      - "KMFA/tools/amount_tools.py"
      - "KMFA/tools/check_no_float_money.py"
    test_refs:
      - "python3 -m unittest KMFA.tests.test_amount_tools -q"
      - "python3 KMFA/tools/check_no_float_money.py"
      - "python3 -m unittest KMFA.tests.test_basic_tool_boundaries -q"
    evidence_refs:
      - "KMFA/stage_artifacts/S04_P1_amount_tools/human/s04_p1_completion_record.md"
      - "KMFA/stage_artifacts/S04_P1_amount_tools/human/test_results.md"
      - "KMFA/stage_artifacts/S04_P3_basic_tool_tests/human/test_results.md"
      - "KMFA/stage_artifacts/S04_P3_basic_tool_tests/human/tool_function_test_report.md"
  - formula_id: "FORM-KMFA-FIELD-STANDARDIZATION-001"
    model_id: "MOD-KMFA-COST-001"
    assumption_ids:
      - "ASM-KMFA-003"
      - "ASM-KMFA-004"
      - "ASM-KMFA-005"
    status: "active"
    fact_level: "EXTRACTED"
    expression: "canonical_field = field_alias_dictionary[source_field_alias]; document_date -> YYYY-MM-DD; period_month -> YYYY-MM; missing_or_invalid_required_field -> field_quality_status with field_skipped_silently=false"
    variables:
      - name: "required_canonical_fields_s04p2"
        data_type: "string_list"
        unit: "field"
        input_domain: "document_date;period_month;company_entity;project_name;counterparty;contract_number"
      - name: "field_alias_dictionary_version"
        data_type: "mapping_version"
        unit: "mapping_version"
        input_domain: "MAP-SRC-kmfa-field-standardization-a1b2c3d4-v0.1.0"
      - name: "missing_field_quality_status"
        data_type: "enum"
        unit: "status"
        input_domain: "field_missing_requires_review;field_skipped_silently=false"
    constraints:
      - "Dates standardize to YYYY-MM-DD."
      - "Periods standardize to YYYY-MM."
      - "Company entity, project name, counterparty, and contract number are required canonical fields."
      - "Missing or invalid required fields enter metadata quality status."
      - "Field issues must not be silently skipped."
      - "Field quality status must not write raw layer or mutate raw sources."
    missing_policy: "Missing, blank, dash, hash, null-ish, invalid date, or invalid period values produce field_quality_status metadata."
    output_range: "standardized field value, field_quality_status metadata, or blocked"
    code_refs:
      - "KMFA/tools/field_standardization.py"
    test_refs:
      - "python3 -m unittest KMFA.tests.test_field_standardization -q"
      - "python3 -m unittest KMFA.tests.test_basic_tool_boundaries -q"
    evidence_refs:
      - "KMFA/stage_artifacts/S04_P2_field_standardization/human/s04_p2_completion_record.md"
      - "KMFA/stage_artifacts/S04_P2_field_standardization/human/test_results.md"
      - "KMFA/stage_artifacts/S04_P3_basic_tool_tests/human/test_results.md"
      - "KMFA/stage_artifacts/S04_P3_basic_tool_tests/human/tool_function_test_report.md"
  - formula_id: "FORM-KMFA-METADATA-ID-001"
    model_id: "MOD-KMFA-METADATA-001"
    assumption_ids:
      - "ASM-KMFA-004"
    status: "active"
    fact_level: "EXTRACTED"
    expression: "metadata_protocol_valid = required_directories_exist AND required_files_exist AND identifier_examples_match_regex AND public_repo_sensitive_plaintext_allowed == false"
    variables:
      - name: "required_metadata_identifiers"
        data_type: "string_list"
        unit: "identifier"
        input_domain: "import_run_id;source_id;file_hash;formula_version;mapping_version"
      - name: "allowed_public_metadata_categories"
        data_type: "string_list"
        unit: "category"
        input_domain: "hash;manifest_index;status;evidence_ref;schema_version;mapping_version;quality_grade;lineage_ref;approval_event_metadata"
    constraints:
      - "Required metadata directories must exist before S02-P1 is complete."
      - "Identifier examples must match their regex definitions."
      - "Public metadata must not contain raw sensitive plaintext."
      - "S02-P1 does not commit business records."
    missing_policy: "Missing directory, missing identifier, parse error, or privacy uncertainty blocks the phase."
    output_range: "valid or blocked"
    code_refs:
      - "KMFA/tools/metadata_protocol_check.py"
    test_refs:
      - "python3 KMFA/tools/metadata_protocol_check.py"
    evidence_refs:
      - "KMFA/metadata/protocol/metadata_protocol.yaml"
      - "KMFA/stage_artifacts/S02_P1_metadata_protocol/human/s02_p1_completion_record.md"
  - formula_id: "FORM-KMFA-IMMUTABILITY-001"
    model_id: "MOD-KMFA-IMMUTABILITY-001"
    assumption_ids:
      - "ASM-KMFA-005"
    status: "active"
    fact_level: "EXTRACTED"
    expression: "immutability_valid = raw_manifest_append_only AND raw_manifest_immutable_fields_present AND derived_versions_append_only AND overwrite_old_version_allowed == false AND control_events_raw_layer_write_allowed == false"
    variables:
      - name: "raw_manifest_immutable_fields"
        data_type: "string_list"
        unit: "field"
        input_domain: "import_run_id;source_id;file_hash;storage_ref;original_filename_hash"
      - name: "frontend_allowed_write_event_types"
        data_type: "string_list"
        unit: "event_type"
        input_domain: "mapping_rule;resolution_event;approval_event;comment;rerun_request;invalidation_request"
    constraints:
      - "raw manifest immutable fields cannot be changed in place."
      - "Derived versions cannot overwrite old versions."
      - "Frontend/control events cannot write raw layer or original extracted values."
      - "Corrections must be append-only events."
    missing_policy: "Missing policy, missing immutable fields, or raw-layer write allowance blocks S02-P2."
    output_range: "valid or blocked"
    code_refs:
      - "KMFA/tools/immutability_policy_check.py"
    test_refs:
      - "python3 KMFA/tools/immutability_policy_check.py"
    evidence_refs:
      - "KMFA/docs/governance/IMMUTABILITY_POLICY.md"
      - "KMFA/stage_artifacts/S02_P2_immutability_policy/human/s02_p2_completion_record.md"
  - formula_id: "FORM-KMFA-QUALITY-GATE-001"
    model_id: "MOD-KMFA-QUALITY-GATE-001"
    assumption_ids:
      - "ASM-KMFA-006"
    status: "active"
    fact_level: "EXTRACTED"
    expression: "report_release_allowed = quality_grade_gate_passed AND report_grade_requirements_met AND missing_gate_evidence_policy != block_release; A requires Q5 AND zero_delta_passed AND critical_differences_closed AND human_confirmation_completed"
    variables:
      - name: "allowed_quality_grades"
        data_type: "string_list"
        unit: "grade"
        input_domain: "Q0;Q1;Q2;Q3;Q4;Q5"
      - name: "allowed_report_grades"
        data_type: "string_list"
        unit: "grade"
        input_domain: "A;B;C;D"
      - name: "missing_gate_evidence_policy"
        data_type: "enum"
        unit: "policy"
        input_domain: "block_release"
    constraints:
      - "Q0-Q2 cannot generate internal reports."
      - "Q3 is preview only."
      - "Q4 can support internal review reports with limitations."
      - "Q5 is required for formal internal reports."
      - "A requires Q5, zero-delta pass, closed critical differences, and human confirmation."
      - "Missing gate evidence blocks release."
    missing_policy: "Missing quality grade, report grade, zero-delta, critical-difference, human confirmation, or lineage evidence blocks promotion."
    output_range: "formal_internal_report, internal_review_report, preview_only, blocked"
    code_refs:
      - "KMFA/tools/check_report_grade_gate.py"
    test_refs:
      - "python3 KMFA/tools/check_report_grade_gate.py"
    evidence_refs:
      - "KMFA/docs/governance/QUALITY_GATE_POLICY.md"
      - "KMFA/stage_artifacts/S02_P3_quality_gate/human/s02_p3_completion_record.md"
  - formula_id: "FORM-KMFA-FILE-REGISTER-001"
    model_id: "MOD-KMFA-FILE-IMPORT-001"
    assumption_ids:
      - "ASM-KMFA-008"
    status: "active"
    fact_level: "EXTRACTED"
    expression: "registration_valid = supported_file_extension AND sha256_file_hash_recorded AND file_size_recorded AND private_storage_ref_generated AND original_filename_plaintext_allowed == false AND zip_members_safe_if_extracting"
    variables:
      - name: "supported_file_extensions_s03p1"
        data_type: "string_list"
        unit: "extension"
        input_domain: ".zip;.xlsx;.xls;.csv;.pdf;.wps;.et;.dps"
      - name: "zip_safety_policy"
        data_type: "string_list"
        unit: "rule"
        input_domain: "reject_absolute_paths;reject_parent_traversal;reject_empty_path_parts;reject_symlink_entries"
      - name: "original_filename_public_allowed"
        data_type: "boolean"
        unit: "privacy"
        input_domain: "false"
    constraints:
      - "Only metadata bundle and private storage reference are produced."
      - "Zip extraction rejects unsafe paths and symlink entries."
      - "WPS/OLE formats return guidance instead of silent high-trust parsing."
      - "S03-P1 does not implement S03-P2 data source matrix or S03-P3 source priority."
    missing_policy: "Missing file, unsupported extension, unsafe zip entry, missing hash, missing size, or privacy uncertainty blocks registration."
    output_range: "registered or blocked"
    code_refs:
      - "KMFA/tools/file_import_register.py"
    test_refs:
      - "python3 -m unittest KMFA.tests.test_file_import_register -q"
    evidence_refs:
      - "KMFA/stage_artifacts/S03_P1_file_import/human/s03_p1_completion_record.md"
  - formula_id: "FORM-KMFA-SOURCE-CHECK-001"
    model_id: "MOD-KMFA-SOURCE-CHECK-001"
    assumption_ids:
      - "ASM-KMFA-009"
    status: "active"
    fact_level: "EXTRACTED"
    expression: "source_check_valid = required_dimensions_present AND status in allowed_statuses AND status_change_target_layer == metadata AND raw_layer_write_allowed == false"
    variables:
      - name: "required_source_check_dimensions"
        data_type: "string_list"
        unit: "dimension"
        input_domain: "source_system;business_segment;source_package_ref;entity_ref;account_ref;frequency"
      - name: "allowed_source_check_statuses"
        data_type: "string_list"
        unit: "status"
        input_domain: "已就绪;部分/阻塞;失败/不适用;已过期;人工复核"
      - name: "status_change_target_layer"
        data_type: "enum"
        unit: "layer"
        input_domain: "metadata"
    constraints:
      - "All six matrix dimensions are required."
      - "Only five TaskPack statuses are valid."
      - "Status changes are append-only metadata events."
      - "No raw source or raw extracted value can be mutated."
      - "S03-P2 does not implement S03-P3 source priority."
    missing_policy: "Missing dimensions, invalid status, or raw-layer write allowance blocks the event."
    output_range: "matrix_row, metadata_status_event, blocked"
    code_refs:
      - "KMFA/tools/source_check_matrix.py"
    test_refs:
      - "python3 -m unittest KMFA.tests.test_source_check_matrix -q"
    evidence_refs:
      - "KMFA/stage_artifacts/S03_P2_source_check_matrix/human/s03_p2_completion_record.md"
  - formula_id: "FORM-KMFA-SOURCE-PRIORITY-001"
    model_id: "MOD-KMFA-SOURCE-PRIORITY-001"
    assumption_ids:
      - "ASM-KMFA-010"
    status: "active"
    fact_level: "EXTRACTED"
    expression: "source_priority_valid = source_class in source_priority_order AND same_source_mismatch_actions == invalidate_derived_cache + request_rerun AND cross_source_conflict_auto_selection_allowed == false"
    variables:
      - name: "source_priority_order"
        data_type: "string_list"
        unit: "source_class"
        input_domain: "raw_upload;authorized_export;raw_extracted_value;staging_structured_row;canonical_fact;derived_metric;report_reference;frontend_display;processed_data"
      - name: "same_source_inconsistency_actions"
        data_type: "string_list"
        unit: "action"
        input_domain: "invalidate_derived_cache;request_rerun"
      - name: "cross_source_conflict_policy"
        data_type: "enum"
        unit: "policy"
        input_domain: "difference_queue;manual_review_required;auto_selection_allowed=false"
    constraints:
      - "Raw uploaded and authorized export sources outrank processed data."
      - "Same-source reference inconsistency invalidates derived cache and requests rerun."
      - "Cross-source conflicts enter a manual-review difference queue."
      - "No cross-source conflict is auto-selected."
      - "No raw source or raw extracted value can be mutated."
    missing_policy: "Missing source class, reference metadata, conflict scope, evidence, or raw-layer boundary blocks the event."
    output_range: "ranked_source_candidate, source_priority_event, source_difference_queue_item, blocked"
    code_refs:
      - "KMFA/tools/source_priority.py"
    test_refs:
      - "python3 -m unittest KMFA.tests.test_source_priority -q"
    evidence_refs:
      - "KMFA/stage_artifacts/S03_P3_source_priority/human/s03_p3_completion_record.md"
  - formula_id: "FORM-KMFA-A0-FILE-REGISTRATION-001"
    model_id: "MOD-KMFA-COST-001"
    assumption_ids:
      - "ASM-KMFA-003"
    status: "active"
    fact_level: "EXTRACTED"
    expression: "a0_file_registration_valid = expected_file_counts_met AND public_safe_inventory_only AND q3_machine_candidate == true AND q4_human_locked == false AND q5_formal_report_allowed == false"
    variables:
      - name: "a0_expected_file_counts"
        data_type: "string"
        unit: "count set"
        input_domain: "total=9;pdf=8;excel=1"
      - name: "a0_member_sha256_policy"
        data_type: "enum"
        unit: "policy"
        input_domain: "recorded_if_private_zip_available;pending_private_zip_unavailable_allowed;legacy_crc_not_sha256"
      - name: "a0_initial_candidate_quality"
        data_type: "enum"
        unit: "quality state"
        input_domain: "Q3_machine_candidate;q4_human_locked=false;q5_formal_report_allowed=false"
    constraints:
      - "A0 registration records metadata only and never commits raw PDF, Excel, or zip files."
      - "Legacy CRC/fingerprint values are not treated as member SHA256."
      - "Q3 A0 candidates cannot be used for formal reporting before human lock and later Stage gates."
    missing_policy: "Missing public-safe manifest, count mismatch, privacy uncertainty, or Q3/Q4/Q5 state mismatch blocks S05-P1 completion."
    output_range: "public_safe_a0_file_manifest or blocked"
    code_refs:
      - "KMFA/tools/a0_file_register.py"
      - "KMFA/tools/check_a0_file_registration.py"
    test_refs:
      - "python3 -m unittest KMFA.tests.test_a0_file_register -q"
      - "python3 KMFA/tools/check_a0_file_registration.py"
    evidence_refs:
      - "KMFA/stage_artifacts/S05_P1_a0_file_registration/human/s05_p1_completion_record.md"
      - "KMFA/stage_artifacts/S05_P1_a0_file_registration/human/test_results.md"
  - formula_id: "FORM-KMFA-A0-GOLDEN-FIXTURE-001"
    model_id: "MOD-KMFA-COST-001"
    assumption_ids:
      - "ASM-KMFA-003"
    status: "active"
    fact_level: "EXTRACTED"
    expression: "a0_golden_fixture_candidate_valid = required_fields_present AND public_raw_values_allowed == false AND public_normalized_values_allowed == false AND q3_machine_candidate == true AND q4_human_confirmed == false AND q5_calculation_baseline_allowed == false"
    variables:
      - name: "required_a0_golden_fields"
        data_type: "string_list"
        unit: "field"
        input_domain: "contract_amount;total_expense;gross_profit;gross_margin;cost_category"
      - name: "a0_private_value_public_policy"
        data_type: "enum"
        unit: "privacy"
        input_domain: "raw_value_public_committed=false;normalized_value_public_committed=false;hash_only_if_private_source_available"
      - name: "a0_fixture_candidate_quality"
        data_type: "enum"
        unit: "quality state"
        input_domain: "Q3_machine_candidate;q4_human_confirmed=false;q5_calculation_baseline_allowed=false"
    constraints:
      - "Public fixture candidates record field contract, private refs, hash status, and source anchor status only."
      - "Raw and normalized business values must not be committed to the public repository."
      - "S05-P2 candidates cannot become Q4/Q5 without private source backfill and later human confirmation."
    missing_policy: "Missing private source values keeps private_value_pending and source_anchor_pending; missing public-safe candidate structure blocks validation."
    output_range: "public_safe_a0_fixture_candidates or blocked"
    code_refs:
      - "KMFA/tools/a0_golden_fixture.py"
      - "KMFA/tools/check_a0_golden_fixture.py"
    test_refs:
      - "python3 -m unittest KMFA.tests.test_a0_golden_fixture -q"
      - "python3 KMFA/tools/check_a0_golden_fixture.py"
    evidence_refs:
      - "KMFA/stage_artifacts/S05_P2_a0_golden_fixture/human/s05_p2_completion_record.md"
      - "KMFA/stage_artifacts/S05_P2_a0_golden_fixture/human/test_results.md"
  - formula_id: "FORM-KMFA-A0-AUTHORITY-BASELINE-LOCK-001"
    model_id: "MOD-KMFA-COST-001"
    assumption_ids:
      - "ASM-KMFA-003"
      - "ASM-KMFA-004"
      - "ASM-KMFA-006"
    status: "active"
    fact_level: "EXTRACTED"
    expression: "authority_lock_valid = q5_lock_requires(raw_value_hash AND normalized_value_hash AND source_anchor_status == recorded_from_private_input AND public_plaintext_absent); excluded_fields = active_owner_authorized_downgrade_decision; formal_report_allowed = false until stage5_review AND zero_delta AND lineage AND report_release_gate"
    variables:
