      - "python3 KMFA/tools/check_a0_authority_baseline_lock.py"
    evidence_refs:
      - "KMFA/stage_artifacts/S05_P3_authority_baseline_lock/human/s05_p3_completion_record.md"
      - "KMFA/stage_artifacts/S05_P3_authority_baseline_lock/human/test_results.md"
      - "KMFA/metadata/baseline/a0_authority_baseline_manifest.json"
  - formula_id: "FORM-KMFA-ZERO-DELTA-VALIDATOR-001"
    model_id: "MOD-KMFA-COST-001"
    assumption_ids:
      - "ASM-KMFA-003"
      - "ASM-KMFA-004"
      - "ASM-KMFA-006"
    status: "active"
    fact_level: "EXTRACTED"
    expression: "zero_delta_valid = for_each(key_fields, amount_fields): authoritative_value_cents - system_value_cents == 0; any abs(difference_cents) >= 1 fails and emits mismatch_report row"
    variables:
      - name: "key_fields"
        data_type: "string_list"
        unit: "field"
        input_domain: "public-safe structured fixture"
      - name: "amount_fields"
        data_type: "string_list"
        unit: "field"
        input_domain: "integer cent fields"
      - name: "authoritative_value_cents"
        data_type: "integer"
        unit: "cent"
        input_domain: "authoritative structured value"
      - name: "system_value_cents"
        data_type: "integer"
        unit: "cent"
        input_domain: "system recomputed structured value"
      - name: "difference_cents"
        data_type: "integer"
        unit: "cent"
        input_domain: "authoritative_value_cents - system_value_cents"
    constraints:
      - "Float money input is rejected."
      - "Any 1 cent difference fails zero-delta validation."
      - "Mismatch report rows include source, field, authoritative value, system value, and difference."
      - "S06-P1 does not write metadata/quality runtime results; S06-P2 queue handling is a separate phase."
    missing_policy: "Missing record or field is reported as mismatch; unsafe input blocks validation."
    output_range: "zero_delta_validation_result, mismatch_report_csv, blocked"
    code_refs:
      - "KMFA/tools/zero_delta_validator.py"
