      - "Fields excluded by active owner/authorized downgrade decision cannot be used for formal reports."
      - "Authority baseline records cannot contain raw_value or normalized_value plaintext."
      - "S05-P3 does not perform Stage 5 review, zero-delta, lineage, report generation, UI, or GitHub upload."
