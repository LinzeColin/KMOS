        data_type: "integer"
        unit: "field"
        input_domain: "40"
      - name: "a0_authority_excluded_field_count"
        data_type: "integer"
        unit: "field"
        input_domain: "5"
      - name: "a0_authority_baseline_identity"
        data_type: "string"
        unit: "version_hash"
        input_domain: "KMFA-A0-Q5-20260630-S05P3-PUBLIC-SAFE-HASH-LOCK;sha256:dbb55ffb4e3608e49dbcf91e97fc0f19395a8269ff7c8f4d5c3f8ca398c03670"
    constraints:
