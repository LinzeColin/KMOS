governance_spec_version: "1.0.0"
project_id: "KMFA"
formulas:
  - formula_id: "FORM-KMFA-GOV-001"
    model_id: "MOD-KMFA-GOV-001"
    assumption_ids:
      - "ASM-KMFA-001"
      - "ASM-KMFA-002"
    status: "active"
    fact_level: "EXTRACTED"
    expression: "phase_run_allowed = current_stage_only AND phase_count <= phase_max_per_run AND no_business_scope_escape; github_upload_allowed = stage_complete AND stage_review_complete AND review_findings_fixed"
    variables:
      - name: "phase_max_per_run"
        data_type: "integer"
        unit: "phase"
        input_domain: "1"
      - name: "stage_review_complete"
        data_type: "boolean"
        unit: "gate"
        input_domain: "true or false"
      - name: "review_findings_fixed"
        data_type: "boolean"
        unit: "gate"
        input_domain: "true or false"
      - name: "phase_github_upload_allowed"
        data_type: "boolean"
        unit: "gate"
        input_domain: "false for intermediate Phase; stage upload allowed only after review and fixes"
    constraints:
      - "One run work solves at most one Phase."
      - "Intermediate Phase completion does not upload to GitHub."
      - "Stage upload requires stage review and fixing review findings."
      - "Quality gates override time reference."
      - "Public repository cannot contain raw sensitive business data."
    missing_policy: "If gate evidence is missing, treat the action as blocked."
    output_range: "allow or stop"
    code_refs:
      - "KMFA/AGENTS.md"
      - "KMFA/HANDOFF.md"
    test_refs:
      - "python3 scripts/lean_governance.py validate --project KMFA"
      - "python3 scripts/validate_project_governance.py --project KMFA"
    evidence_refs:
      - "KMFA/docs/governance/project.yaml"
      - "KMFA/stage_artifacts/S01_STAGE_REVIEW/human/stage1_review_report.md"
  - formula_id: "FORM-KMFA-AMOUNT-001"
    model_id: "MOD-KMFA-COST-001"
    assumption_ids:
      - "ASM-KMFA-003"
    status: "planned"
    fact_level: "PROPOSED"
    expression: "normalized_amount_cents = Decimal(raw_amount * unit_multiplier * 100); any 0.01 yuan mismatch fails or enters mismatch queue."
    variables:
      - name: "raw_amount"
        data_type: "decimal string"
        unit: "yuan or ten-thousand-yuan"
        input_domain: "authorized extracted value"
      - name: "unit_multiplier"
        data_type: "decimal"
        unit: "multiplier"
        input_domain: "1 or 10000"
      - name: "normalized_amount_cents"
        data_type: "integer"
        unit: "cent"
        input_domain: "business amount"
    constraints:
      - "No float for business money."
      - "Blank, dash, hash marks, and abnormal text must not silently become 0."
      - "PDF and Excel conflicts keep both source values and enter mismatch queue."
    missing_policy: "Missing or abnormal amount enters validation error or mismatch queue."
    output_range: "integer cents or validation error"
    code_refs:
      - "planned: KMFA/tools/check_no_float_money.py"
    test_refs:
      - "planned: S04/S06/S18 amount and zero-delta tests"
    evidence_refs:
      - "KMFA/模型参数文件.md"
  - formula_id: "FORM-KMFA-METADATA-ID-001"
    model_id: "MOD-KMFA-METADATA-001"
    assumption_ids:
      - "ASM-KMFA-004"
    status: "active"
    fact_level: "EXTRACTED"
    expression: "metadata_protocol_valid = required_directories_exist AND required_files_exist AND identifier_examples_match_regex AND public_repo_sensitive_plaintext_allowed == false"
    variables:
      - name: "required_metadata_identifiers"
        data_type: "string_list"
        unit: "identifier"
        input_domain: "import_run_id;source_id;file_hash;formula_version;mapping_version"
      - name: "allowed_public_metadata_categories"
        data_type: "string_list"
        unit: "category"
        input_domain: "hash;manifest_index;status;evidence_ref;schema_version;mapping_version;quality_grade;lineage_ref;approval_event_metadata"
    constraints:
      - "Required metadata directories must exist before S02-P1 is complete."
      - "Identifier examples must match their regex definitions."
      - "Public metadata must not contain raw sensitive plaintext."
      - "S02-P1 does not commit business records."
    missing_policy: "Missing directory, missing identifier, parse error, or privacy uncertainty blocks the phase."
    output_range: "valid or blocked"
    code_refs:
      - "KMFA/tools/metadata_protocol_check.py"
    test_refs:
      - "python3 KMFA/tools/metadata_protocol_check.py"
    evidence_refs:
      - "KMFA/metadata/protocol/metadata_protocol.yaml"
      - "KMFA/stage_artifacts/S02_P1_metadata_protocol/human/s02_p1_completion_record.md"
