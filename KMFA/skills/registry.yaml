    severity: blocking
    detail: >-
      考勤与上游归档 skill 都通过 subprocess 调 dws（DingTalk Workspace CLI，取环境变量
      DWS_BIN，回落到 "dws"）。Owner 本机 command -v dws 找不到、~/.dws/ 不存在 ——
      所以这两个 skill 目前在本机就跑不起来，与 cwd 失效是【两个独立故障】。
      dws 是 DingTalk Workspace，GitHub 上有开源实现，不绑 Codex。需选定实现并固化版本。
  - id: SCHEDULES_ALL_BROKEN
    severity: blocking
    detail: >-
      6 条 ACTIVE 排程 cwd 全部指向 2026-07-17 清理时删除的 main_worktree 路径，正在空跑失败。
      只能 Owner 在 Codex 应用界面改。KMFA 已迁至本仓（KMOS），新 cwd 需按本仓 clone 位置确定。
