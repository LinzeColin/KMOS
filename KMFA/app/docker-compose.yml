# KMFA App（DT6）。上线经 Cloudflare Tunnel + Access（PROD.0020/0021），实例零开放端口。
services:
  app:
    build: ./backend
    container_name: kmfa-app
    restart: always
    environment:
      KMFA_PUBLIC_SHELL_ENABLED: "${KMFA_PUBLIC_SHELL_ENABLED:-1}"
      KMFA_PRIVATE_OPS_REQUIRE_ACCESS: "${KMFA_PRIVATE_OPS_REQUIRE_ACCESS:-1}"
      KMFA_CLOUDFLARE_ACCESS_TEAM_DOMAIN: "${KMFA_CLOUDFLARE_ACCESS_TEAM_DOMAIN:-}"
      KMFA_CLOUDFLARE_ACCESS_AUD: "${KMFA_CLOUDFLARE_ACCESS_AUD:-}"
    volumes:
      - /opt/kmfa/KMOS:/opt/kmfa/KMOS:ro   # 只读挂仓：facts/断言/registry
    ports:
      - "127.0.0.1:8000:8000"              # 仅本机回环，出网走 cloudflared
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request;urllib.request.urlopen('http://127.0.0.1:8000/healthz')"]
      interval: 2m
      timeout: 10s
