# KMFA → Coolify 自动部署（Golden Path caller）。
# 治理（Owner 2026-07-18）：统一走 Coolify（OVH 主机）+ Cloudflare，不加第四件。
#   影响运行态的 main push → 经 Coolify API token 触发重部署 KMOS 应用（uuid 由基建线 operate 预建）。
#   仅修改 KMFA 治理合同、handoff、导航和 compact receipt 时不重建同一运行态。
#   复用工作流 LinzeColin/CodexProject：verify → deploy → home-sync。
#   skills 默认 KMFA_DELIVERY_ENABLED=0（dry-run，不投递）；无入站端口。
# secrets COOLIFY_BASE_URL / COOLIFY_API_TOKEN 由基建线在 KMOS 仓预设（最小 deploy+read 权限）。
name: deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - ".github/workflows/deploy.yml"
      - "KMFA/AGENTS.md"
      - "KMFA/HANDOFF.md"
      - "KMFA/machine/README.md"
      - "KMFA/machine/runs/SOURCE_IDENTITY.md"
      - "KMFA/machine/runs/RECOVERY_RECONCILIATION.md"
      - "KMFA/machine/runs/RECOVERY_RECONCILIATION.csv"
      - "KMFA/machine/runs/AUTHORITY_REGISTER.md"
      - "KMFA/machine/runs/PREAUTHORIZED_INPUTS_CHECKLIST.md"
      - "KMFA/machine/runs/S00_STAGE_REVIEW.md"
      - "KMFA/machine/runs/S01_P11_CUSTOMER_PRFAQ.md"
      - "KMFA/machine/runs/S01_P12_PRD_OKR.md"
      - "KMFA/machine/runs/S01_P13_COST_BENEFIT_AND_KILL_CRITERIA.md"
      - "KMFA/machine/runs/S01_P14_PRODUCT_CONTRACT.md"
      - "KMFA/machine/runs/S01_STAGE_REVIEW.md"

jobs:
  golden-path:
    uses: LinzeColin/CodexProject/.github/workflows/linze-golden-path.reusable.yml@main
    with:
      service_name: kmfa-kmos
      coolify_app_uuid: "gz5qao2k0zrx3polpbwgcg51"
    secrets:
      COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
      COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
