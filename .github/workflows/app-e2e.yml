# KMFA App зңҹж•°жҚ®з«ҜеҲ°з«ҜеӣһеҪ’еҹәзәҝпјҲTSK.KMFA.PROD.0013пјүгҖӮ
#
# йӘҢж”¶еҺҹж–ҮпјҡгҖҢеҚҮзә§ kmfa_html_human_flow_audit.py иҰҶзӣ– Appпјҡзҷ»еҪ•вҶ’йҰ–йЎөвҶ’жЈҖжҹҘжқҝвҶ’жҲҗжң¬йЎөвҶ’
# е·®ејӮеӨ„зҗҶвҶ’еҪұе“Қйў„и§ҲвҶ’йҮҚи·‘вҶ’жҠҘе‘ҠеҜјеҮәпјӣе…ЁжөҒ PASSпјӣ**дҪңдёә App еӣһеҪ’еҹәзәҝе…Ҙ CI**гҖҚгҖӮ
#
# жң¬е·ҘдҪңжөҒзңҹиө·жңҚеҠЎгҖҒзңҹејҖйЎөйқўгҖҒзңҹзӮ№жҢүй’®пјҲе·®ејӮеӨ„зҗҶдјҡзңҹеҶҷдёҖжқЎеҶізӯ–гҖҒйҮҚи·‘дјҡзңҹи·‘еӣӣеұӮй“ҫгҖҒ
# жҠҘе‘ҠеҜјеҮәдјҡзңҹдёӢиҪҪдёүдёӘж–Үд»¶пјүпјҢд»»дҪ•дёҖжӯҘ FAIL е°ұзәўгҖӮ**дёҚжӢҝ /healthz еҪ“йҖҡиҝҮдҫқжҚ®гҖӮ**
name: app-e2e

on:
  push:
    branches: [main]
    paths:
      - "KMFA/app/**"
      - "KMFA/machine/facts/**"
      - "KMFA/metadata/**"
      - "KMFA/taskpack/v1_4/html_uiux/kmfa_html_human_flow_audit.py"
      - ".github/workflows/app-e2e.yml"
  pull_request:
    paths:
      - "KMFA/app/**"
      - "KMFA/machine/facts/**"
      - "KMFA/metadata/**"
      - "KMFA/taskpack/v1_4/html_uiux/kmfa_html_human_flow_audit.py"
      - ".github/workflows/app-e2e.yml"
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: жһ„е»әеүҚз«ҜпјҲdist е…Ҙй•ңеғҸпјү
        run: |
          set -euo pipefail
          cd KMFA/app/frontend
          npm ci
          npm run build          # жһ„е»әеӨұиҙҘеҝ…йЎ»зәўпјҡжӣҫжӢҝд»“йҮҢж—§ dist жү“й•ңеғҸиҖҢдёҚиҮӘзҹҘ

      - name: иө· AppпјҲйӣ¶жҢӮиҪҪпјҢд»Јз Ғзғ§еңЁй•ңеғҸйҮҢпјү
        run: |
          set -euo pipefail
          docker build -f KMFA/app/backend/Dockerfile -t kmfa-app:e2e .
          mkdir -p /tmp/kmfa-state
          docker run -d --name kmfa-e2e -p 18098:8000 \
            -v /tmp/kmfa-state:/var/lib/kmfa/state kmfa-app:e2e
          for i in $(seq 1 60); do
            curl -sf http://localhost:18098/healthz >/dev/null && break
            sleep 2
          done
          curl -sf http://localhost:18098/healthz >/dev/null || {
            echo "::error::App жңӘиө·жқҘ"; docker logs kmfa-e2e; exit 1; }

      - name: иЈ… Playwright
        run: |
          set -euo pipefail
          pip install --quiet playwright==1.49.0
          python -m playwright install --with-deps chromium

      - name: и·‘е…ЁжөҒз«ҜеҲ°з«Ҝ
        run: |
          set -euo pipefail
          python - <<'PY'
          import pathlib, sys
          src = pathlib.Path("KMFA/taskpack/v1_4/html_uiux/kmfa_html_human_flow_audit.py").read_text(encoding="utf-8")
          src = src.replace("executable_path=CHROMIUM, ", "")
          sys.argv = ["audit", "--app-url", "http://localhost:18098", "--out", "e2e_result.csv"]
          exec(compile(src, "audit", "exec"))
          PY

      - name: жү“еҚ°йҖҗжӯҘз»“жһң
        if: always()
        run: |
          python - <<'PY'
          import csv, pathlib
          p = pathlib.Path("e2e_result.csv")
          if not p.exists():
              print("жңӘдә§еҮәз»“жһңж–Үд»¶"); raise SystemExit
          for r in list(csv.reader(p.open(encoding="utf-8-sig")))[1:]:
              print(f"{'PASS' if r[6]=='PASS' else 'FAIL'}  [{r[1]}]  {r[4][:30]}  {r[7][:90]}")
          PY

      - name: з•ҷеӯҳиҜҒжҚ®
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-e2e-result
          path: e2e_result.csv

      - name: ж”¶е®№еҷЁ
        if: always()
        run: docker rm -f kmfa-e2e || true
