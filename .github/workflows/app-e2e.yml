# KMFA 公共 App Shell + 私有经营 App 真数据端到端回归基线。
#
# 验收原文：「升级 kmfa_html_human_flow_audit.py 覆盖 App：登录→首页→检查板→成本页→
# 差异处理→影响预览→重跑→报告导出；全流 PASS；**作为 App 回归基线入 CI**」。
#
# 本工作流真起服务、真开页面、真点按钮（差异处理会真写一条决策、重跑会真跑四层链、
# 报告导出会真下载三个文件），任何一步 FAIL 就红。**不拿 /healthz 当通过依据。**
name: app-e2e

on:
  # main 部署工作流以 reusable call 调用本 Gate；不要另起并行 push run，
  # 否则 deploy 可能在这组测试完成前晋级同一 SHA。
  workflow_call:
  pull_request:
    paths:
      - "KMFA/app/**"
      - "KMFA/machine/facts/**"
      - "KMFA/metadata/**"
      - "KMFA/taskpack/v1_4/html_uiux/kmfa_html_human_flow_audit.py"
      - ".github/workflows/app-e2e.yml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: KMFA/app/backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: KMFA/app/frontend/package-lock.json

      - name: 跑后端与治理阻断门禁
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONPATH: KMFA/app/backend
        run: |
          set -euo pipefail
          python -m pip install --quiet \
            -r KMFA/app/backend/requirements.txt \
            pytest==9.1.1 httpx==0.28.1
          python -m pytest -q KMFA/app/backend/tests
          python KMFA/machine/tools/validate_taskpack.py --root KMFA
          python KMFA/machine/tools/test_validate_taskpack_mutations.py --root KMFA
          python KMFA/machine/tools/check_dual_plane_ci.py --root . --require-projects

      # 前端不再在 runner 上预构建：Dockerfile 已改多阶段，镜像内由当次源码现建 dist
      # （「曾拿仓里旧 dist 打镜像而不自知」的教训由 Dockerfile 结构性根治，兜底退役）。
      # 前端构建失败会红在 docker build 这一步，红的语义不变。
      - name: 起 App（零挂载，代码烧在镜像里，前端镜像内现建）
        run: |
          set -euo pipefail
          docker build -f KMFA/app/backend/Dockerfile -t kmfa-app:e2e .
          mkdir -p /tmp/kmfa-state
          docker run -d --name kmfa-e2e -p 18098:8000 \
            -e KMFA_PUBLIC_INDEXING_ENABLED=1 \
            -e KMFA_WALKING_SKELETON_ENABLED=1 \
            -v /tmp/kmfa-state:/var/lib/kmfa/state kmfa-app:e2e
          for _ in {1..60}; do
            curl -sf http://localhost:18098/healthz >/dev/null && break
            sleep 2
          done
          curl -sf http://localhost:18098/healthz >/dev/null || {
            echo "::error::App 未起来"; docker logs kmfa-e2e; exit 1; }

      - name: 装 Playwright
        run: |
          set -euo pipefail
          npm ci --prefix KMFA/app/frontend --ignore-scripts
          pip install --quiet playwright==1.60.0
          python -m playwright install --with-deps chromium firefox webkit

      - name: 跑公共 App Shell（桌面 / 移动 / 无 JS / 依赖降级）
        run: |
          set -euo pipefail
          python KMFA/app/e2e/public_shell_flow.py \
            --base-url http://localhost:18098 \
            --out-dir public-shell-e2e

      - name: 跑公开页可访问性与索引边界（三浏览器）
        run: |
          set -euo pipefail
          python KMFA/app/e2e/public_accessibility_index.py \
            --base-url http://localhost:18098 \
            --out-dir public-accessibility-index-e2e

      - name: 跑匿名恢复与 secret hygiene（会话撤销 / 泄露扫描 / 重启 / hash / Flag 回滚）
        run: |
          set -euo pipefail
          p34_state=$(mktemp -d /tmp/kmfa-p34-state.XXXXXX)
          python KMFA/app/e2e/walking_skeleton_flow.py \
            --image kmfa-app:e2e \
            --state-dir "$p34_state" \
            --out-dir walking-skeleton-e2e \
            --container-name kmfa-p34-e2e \
            --port 18099

      - name: 跑私有经营 App 全流端到端
        run: |
          set -euo pipefail
          python - <<'PY'
          import pathlib, sys
          src = pathlib.Path("KMFA/taskpack/v1_4/html_uiux/kmfa_html_human_flow_audit.py").read_text(encoding="utf-8")
          src = src.replace("executable_path=CHROMIUM, ", "")
          sys.argv = ["audit", "--app-url", "http://localhost:18098", "--out", "e2e_result.csv"]
          exec(compile(src, "audit", "exec"))
          PY

      - name: 打印逐步结果
        if: always()
        run: |
          python - <<'PY'
          import csv, pathlib
          p = pathlib.Path("e2e_result.csv")
          if not p.exists():
              print("未产出结果文件"); raise SystemExit
          for r in list(csv.reader(p.open(encoding="utf-8-sig")))[1:]:
              print(f"{'PASS' if r[6]=='PASS' else 'FAIL'}  [{r[1]}]  {r[4][:30]}  {r[7][:90]}")
          PY

      - name: 留存证据
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-e2e-result
          path: |
            e2e_result.csv
            public-shell-e2e/
            public-accessibility-index-e2e/
            walking-skeleton-e2e/

      - name: 收容器
        if: always()
        run: |
          docker rm -f kmfa-e2e || true
          docker rm -f kmfa-p34-e2e || true
