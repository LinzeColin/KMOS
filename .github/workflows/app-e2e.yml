# KMFA е…¬е…ұ App Shell + з§Ғжңүз»ҸиҗҘ App зңҹж•°жҚ®з«ҜеҲ°з«ҜеӣһеҪ’еҹәзәҝгҖӮ
#
# йӘҢж”¶еҺҹж–ҮпјҡгҖҢеҚҮзә§ kmfa_html_human_flow_audit.py иҰҶзӣ– Appпјҡзҷ»еҪ•вҶ’йҰ–йЎөвҶ’жЈҖжҹҘжқҝвҶ’жҲҗжң¬йЎөвҶ’
# е·®ејӮеӨ„зҗҶвҶ’еҪұе“Қйў„и§ҲвҶ’йҮҚи·‘вҶ’жҠҘе‘ҠеҜјеҮәпјӣе…ЁжөҒ PASSпјӣ**дҪңдёә App еӣһеҪ’еҹәзәҝе…Ҙ CI**гҖҚгҖӮ
#
# жң¬е·ҘдҪңжөҒзңҹиө·жңҚеҠЎгҖҒзңҹејҖйЎөйқўгҖҒзңҹзӮ№жҢүй’®пјҲе·®ејӮеӨ„зҗҶдјҡзңҹеҶҷдёҖжқЎеҶізӯ–гҖҒйҮҚи·‘дјҡзңҹи·‘еӣӣеұӮй“ҫгҖҒ
# жҠҘе‘ҠеҜјеҮәдјҡзңҹдёӢиҪҪдёүдёӘж–Үд»¶пјүпјҢд»»дҪ•дёҖжӯҘ FAIL е°ұзәўгҖӮ**дёҚжӢҝ /healthz еҪ“йҖҡиҝҮдҫқжҚ®гҖӮ**
name: app-e2e

on:
  # main йғЁзҪІе·ҘдҪңжөҒд»Ҙ reusable call и°ғз”Ёжң¬ GateпјӣдёҚиҰҒеҸҰиө·е№¶иЎҢ push runпјҢ
  # еҗҰеҲҷ deploy еҸҜиғҪеңЁиҝҷз»„жөӢиҜ•е®ҢжҲҗеүҚжҷӢзә§еҗҢдёҖ SHAгҖӮ
  workflow_call:
  pull_request:
    paths:
      - "KMFA/app/**"
      - "KMFA/machine/facts/**"
      - "KMFA/metadata/**"
      - "KMFA/taskpack/v1_4/html_uiux/kmfa_html_human_flow_audit.py"
      - ".github/workflows/app-e2e.yml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: KMFA/app/backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: KMFA/app/frontend/package-lock.json

      - name: и·‘еҗҺз«ҜдёҺжІ»зҗҶйҳ»ж–ӯй—ЁзҰҒ
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONPATH: KMFA/app/backend
        run: |
          set -euo pipefail
          python -m pip install --quiet \
            -r KMFA/app/backend/requirements.txt \
            pytest==9.1.1 httpx==0.28.1
          python -m pytest -q KMFA/app/backend/tests
          python KMFA/machine/tools/validate_taskpack.py --root KMFA
          python KMFA/machine/tools/test_validate_taskpack_mutations.py --root KMFA
          python KMFA/machine/tools/check_dual_plane_ci.py --root . --require-projects

      # еүҚз«ҜдёҚеҶҚеңЁ runner дёҠйў„жһ„е»әпјҡDockerfile е·Іж”№еӨҡйҳ¶ж®өпјҢй•ңеғҸеҶ…з”ұеҪ“ж¬Ўжәҗз ҒзҺ°е»ә dist
      # пјҲгҖҢжӣҫжӢҝд»“йҮҢж—§ dist жү“й•ңеғҸиҖҢдёҚиҮӘзҹҘгҖҚзҡ„ж•ҷи®ӯз”ұ Dockerfile з»“жһ„жҖ§ж №жІ»пјҢе…ңеә•йҖҖеҪ№пјүгҖӮ
      # еүҚз«Ҝжһ„е»әеӨұиҙҘдјҡзәўеңЁ docker build иҝҷдёҖжӯҘпјҢзәўзҡ„иҜӯд№үдёҚеҸҳгҖӮ
      - name: иө· AppпјҲйӣ¶жҢӮиҪҪпјҢд»Јз Ғзғ§еңЁй•ңеғҸйҮҢпјҢеүҚз«Ҝй•ңеғҸеҶ…зҺ°е»әпјү
        run: |
          set -euo pipefail
          docker build -f KMFA/app/backend/Dockerfile -t kmfa-app:e2e .
          mkdir -p /tmp/kmfa-state
          docker run -d --name kmfa-e2e -p 18098:8000 \
            -e KMFA_PUBLIC_INDEXING_ENABLED=1 \
            -e KMFA_WALKING_SKELETON_ENABLED=1 \
            -v /tmp/kmfa-state:/var/lib/kmfa/state kmfa-app:e2e
          for _ in {1..60}; do
            curl -sf http://localhost:18098/healthz >/dev/null && break
            sleep 2
          done
          curl -sf http://localhost:18098/healthz >/dev/null || {
            echo "::error::App жңӘиө·жқҘ"; docker logs kmfa-e2e; exit 1; }

      - name: иЈ… Playwright
        run: |
          set -euo pipefail
          npm ci --prefix KMFA/app/frontend --ignore-scripts
          pip install --quiet playwright==1.60.0
          python -m playwright install --with-deps chromium firefox webkit

      - name: и·‘е…¬е…ұ App ShellпјҲжЎҢйқў / з§»еҠЁ / ж—  JS / дҫқиө–йҷҚзә§пјү
        run: |
          set -euo pipefail
          python KMFA/app/e2e/public_shell_flow.py \
            --base-url http://localhost:18098 \
            --out-dir public-shell-e2e

      - name: и·‘е…¬ејҖйЎөеҸҜи®ҝй—®жҖ§дёҺзҙўеј•иҫ№з•ҢпјҲдёүжөҸи§ҲеҷЁпјү
        run: |
          set -euo pipefail
          python KMFA/app/e2e/public_accessibility_index.py \
            --base-url http://localhost:18098 \
            --out-dir public-accessibility-index-e2e

      - name: и·‘еҢҝеҗҚжҒўеӨҚдёҺ secret hygieneпјҲдјҡиҜқж’Өй”Җ / жі„йңІжү«жҸҸ / йҮҚеҗҜ / hash / Flag еӣһж»ҡпјү
        run: |
          set -euo pipefail
          p34_state=$(mktemp -d /tmp/kmfa-p34-state.XXXXXX)
          python KMFA/app/e2e/walking_skeleton_flow.py \
            --image kmfa-app:e2e \
            --state-dir "$p34_state" \
            --out-dir walking-skeleton-e2e \
            --container-name kmfa-p34-e2e \
            --port 18099

      - name: и·‘еҢҝеҗҚеҸҚж»Ҙз”ЁпјҲжӯЈеёёиҜҜдјӨ / дә”зұ»ж”»еҮ» / е№¶еҸ‘йў„з®— / жҒўеӨҚпјү
        run: |
          set -euo pipefail
          p44_state=$(mktemp -d /tmp/kmfa-p44-state.XXXXXX)
          python KMFA/app/e2e/abuse_control_flow.py \
            --image kmfa-app:e2e \
            --state-dir "$p44_state" \
            --out-dir abuse-control-e2e \
            --container-name kmfa-p44-e2e \
            --port 18105

      - name: и·‘з§Ғжңүз»ҸиҗҘ App е…ЁжөҒз«ҜеҲ°з«Ҝ
        run: |
          set -euo pipefail
          python - <<'PY'
          import pathlib, sys
          src = pathlib.Path("KMFA/taskpack/v1_4/html_uiux/kmfa_html_human_flow_audit.py").read_text(encoding="utf-8")
          src = src.replace("executable_path=CHROMIUM, ", "")
          sys.argv = ["audit", "--app-url", "http://localhost:18098", "--out", "e2e_result.csv"]
          exec(compile(src, "audit", "exec"))
          PY

      - name: жү“еҚ°йҖҗжӯҘз»“жһң
        if: always()
        run: |
          python - <<'PY'
          import csv, pathlib
          p = pathlib.Path("e2e_result.csv")
          if not p.exists():
              print("жңӘдә§еҮәз»“жһңж–Үд»¶"); raise SystemExit
          for r in list(csv.reader(p.open(encoding="utf-8-sig")))[1:]:
              print(f"{'PASS' if r[6]=='PASS' else 'FAIL'}  [{r[1]}]  {r[4][:30]}  {r[7][:90]}")
          PY

      - name: з•ҷеӯҳиҜҒжҚ®
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-e2e-result
          path: |
            e2e_result.csv
            public-shell-e2e/
            public-accessibility-index-e2e/
            walking-skeleton-e2e/
            abuse-control-e2e/

      - name: ж”¶е®№еҷЁ
        if: always()
        run: |
          docker rm -f kmfa-e2e || true
          docker rm -f kmfa-p34-e2e || true
          docker rm -f kmfa-p44-e2e || true
